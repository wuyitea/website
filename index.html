    <!-- 首页轮播脚本 -->
    <script>
    var heroIndex = 0, heroTimer = null;
    function loadHeroSlides() {
        var saved = localStorage.getItem('admin_homepage_slides');
        var slides = [];
        try { slides = saved ? JSON.parse(saved) : []; } catch (e) { slides = []; }
        slides = slides.filter(function(s) { return s.media; });
        if (!slides.length) {
            document.getElementById('heroCarousel').style.display = 'none';
            document.getElementById('heroFallback').style.display = 'flex';
            return;
        }
        document.getElementById('heroCarousel').style.display = 'block';
        document.getElementById('heroFallback').style.display = 'none';
        var container = document.getElementById('heroSlides');
        var dotsEl = document.getElementById('heroDots');
        container.innerHTML = slides.map(function(s) {
            var tag = '';
            if (s.type === 'video') {
                tag = '<video src="' + s.media + '" muted loop playsinline autoplay style="width:100%;height:100%;object-fit:cover"></video>';
            } else {
                tag = '<img src="' + s.media + '" alt="" style="width:100%;height:100%;object-fit:cover">';
            }
            var wrap = s.link ? '<a href="' + s.link + '" target="_blank" style="display:block;width:100%;height:100%">' + tag + '</a>' : tag;
            return '<div style="min-width:100%;height:100%;position:relative;flex-shrink:0">' + wrap + '</div>';
        }).join('');
        dotsEl.innerHTML = slides.map(function(_, i) {
            return '<div onclick="goHero(' + i + ')" style="width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.3s' + (i === 0 ? ';background:#fff;transform:scale(1.2)' : '') + '"></div>';
        }).join('');
        if (slides.length > 1) { clearInterval(heroTimer); heroTimer = setInterval(heroNext, 5000); }
    }
    function updateHero() {
        var slides = document.getElementById('heroSlides');
        var dots = document.getElementById('heroDots');
        if (!slides.children.length) return;
        slides.style.transform = 'translateX(-' + (heroIndex * 100) + '%)';
        Array.from(dots.children).forEach(function(d, i) {
            d.style.background = i === heroIndex ? '#fff' : 'rgba(255,255,255,0.4)';
            d.style.transform = i === heroIndex ? 'scale(1.2)' : 'scale(1)';
        });
        var videos = slides.querySelectorAll('video');
        videos.forEach(function(v, i) { i === heroIndex ? v.play().catch(function(){}) : v.pause(); });
    }
    function heroNext() { var t = document.getElementById('heroSlides').children.length; if (!t) return; heroIndex = (heroIndex + 1) % t; updateHero(); }
    function heroPrev() { var t = document.getElementById('heroSlides').children.length; if (!t) return; heroIndex = (heroIndex - 1 + t) % t; updateHero(); }
    function goHero(i) { heroIndex = i; updateHero(); }
    loadHeroSlides();
    </script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 社区平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">
    <link rel="stylesheet" href="../css/style.css?v=7">
    <link rel="stylesheet" href="../css/responsive.css?v=7">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i class="ti ti-brand-community"></i></div>
                <div>
                    <h2>社区平台</h2>
                    <p>管理后台</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="admin.html"><i class="ti ti-dashboard"></i> 仪表盘</a>
                <a href="admin-forum.html"><i class="ti ti-message-circle"></i> 论坛管理</a>

                <a href="admin-users.html" class="active"><i class="ti ti-users"></i> 用户管理</a>
                <div class="sidebar-nav-label">系统</div>
                <a href="admin-settings.html"><i class="ti ti-settings"></i> 网站设置</a>
                <a href="../index.html" target="_blank"><i class="ti ti-external-link"></i> 查看前台</a>
                <a href="#" id="adminLogout"><i class="ti ti-logout"></i> 退出登录</a>
            </nav>
            <div class="sidebar-user">
                <div class="sidebar-user-avatar"><i class="ti ti-user-circle"></i></div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name">管理员</div>
                    <div class="sidebar-user-role">超级管理员</div>
                </div>
            </div>
        </aside>

        <main class="admin-main">
            <div class="admin-topbar">
                <div class="admin-topbar-left">
                    <button class="admin-topbar-btn" id="sidebarToggle" style="display:none">
                        <i class="ti ti-menu-2" style="font-size:1.25rem"></i>
                    </button>
                    <h1>用户管理</h1>
                </div>
                <div class="admin-topbar-right">
                    <button class="admin-topbar-btn" title="通知">
                        <i class="ti ti-bell"></i>
                        <span class="notif-dot"></span>
                    </button>
                    <button class="admin-topbar-btn" title="设置">
                        <i class="ti ti-settings"></i>
                    </button>
                </div>
            </div>

            <div class="admin-content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(79,70,229,0.1);color:var(--primary-color)">
                            <i class="ti ti-users"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" id="statTotal">0</div>
                            <div class="stat-label">总用户数</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(16,185,129,0.1);color:var(--success-color)">
                            <i class="ti ti-user-check"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" id="statActive">0</div>
                            <div class="stat-label">正常用户</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(239,68,68,0.1);color:var(--danger-color)">
                            <i class="ti ti-user-off"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" id="statBanned">0</div>
                            <div class="stat-label">被封禁</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(245,158,11,0.1);color:var(--warning-color)">
                            <i class="ti ti-user-plus"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" id="statWeek">0</div>
                            <div class="stat-label">本周注册</div>
                        </div>
                    </div>
                </div>

                <div class="admin-card">
                    <div class="admin-card-header">
                        <h2><i class="ti ti-users" style="margin-right:0.375rem"></i>用户列表</h2>
                        <div class="card-actions">
                            <div class="input-icon">
                                <i class="ti ti-search"></i>
                                <input type="text" class="admin-search" placeholder="搜索用户..." id="userSearch">
                            </div>
                            <select class="admin-filter" id="userFilter">
                                <option value="all">全部状态</option>
                                <option value="active">正常</option>
                                <option value="banned">封禁</option>
                            </select>
                        </div>
                    </div>
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>用户</th>
                                <th>邮箱</th>
                                <th>注册时间</th>
                                <th>帖子数</th>
                                <th>商品数</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                        </tbody>
                    </table>
                    <div class="admin-pagination">
                        <span class="pagination-info" id="paginationInfo">显示 0 / 共 0 条</span>
                        <div class="pagination-btns">
                            <button disabled>&laquo;</button>
                            <button class="active">1</button>
                            <button>&raquo;</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="admin-modal-overlay" id="userModal">
        <div class="admin-modal">
            <div class="admin-modal-header">
                <h3><i class="ti ti-user" style="margin-right:0.375rem"></i>用户详情</h3>
                <button class="admin-modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
            </div>
            <div class="admin-modal-body">
                <div class="detail-grid" id="userDetailGrid">
                </div>
            </div>
            <div class="admin-modal-footer">
                <button class="btn-admin btn-admin-outline" onclick="closeModal()"><i class="ti ti-x" style="margin-right:0.25rem"></i>关闭</button>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = 'admin-login.html';
        }
        document.getElementById('adminLogout').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'admin-login.html';
        });

        var sidebarToggle = document.getElementById('sidebarToggle');
        var sidebar = document.getElementById('sidebar');
        function checkSidebar() {
            sidebarToggle.style.display = window.innerWidth <= 1024 ? 'flex' : 'none';
        }
        checkSidebar();
        window.addEventListener('resize', checkSidebar);
        sidebarToggle.addEventListener('click', function() {
            sidebar.classList.toggle('show');
        });
        document.addEventListener('click', function(e) {
            if (window.innerWidth <= 1024 && !sidebar.contains(e.target) && !sidebarToggle.contains(e.target)) {
                sidebar.classList.remove('show');
            }
        });

        function loadUsers() {
            var users = JSON.parse(localStorage.getItem('users') || '[]');
            var tbody = document.getElementById('userTableBody');
            var posts = JSON.parse(localStorage.getItem('posts') || '[]');
            var products = JSON.parse(localStorage.getItem('products') || '[]');

            var total = users.length;
            var active = users.filter(function(u) { return u.status !== 'banned'; }).length;
            var banned = users.filter(function(u) { return u.status === 'banned'; }).length;
            var weekAgo = new Date(Date.now() - 7 * 86400000);
            var weekNew = users.filter(function(u) { return new Date(u.createdAt) > weekAgo; }).length;
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statActive').textContent = active;
            document.getElementById('statBanned').textContent = banned;
            document.getElementById('statWeek').textContent = weekNew;

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-light);padding:2rem"><i class="ti ti-users" style="font-size:1.5rem;display:block;margin-bottom:0.5rem"></i>暂无注册用户</td></tr>';
                document.getElementById('paginationInfo').textContent = '显示 0 / 共 0 条';
                return;
            }

            var html = '';
            users.forEach(function(user, index) {
                var userPosts = posts.filter(function(p) { return p.authorId === user.id; }).length;
                var userProducts = products.filter(function(p) { return p.sellerId === user.id; }).length;
                var status = user.status === 'banned' ? 'banned' : 'active';
                var statusBadge = status === 'banned' ?
                    '<span class="badge badge-danger"><i class="ti ti-user-off" style="margin-right:0.25rem"></i>封禁</span>' :
                    '<span class="badge badge-success"><i class="ti ti-user-check" style="margin-right:0.25rem"></i>正常</span>';
                var action = status === 'banned' ?
                    '<button class="btn-admin btn-admin-success" onclick="unbanUser(\'' + user.id + '\')"><i class="ti ti-check"></i></button>' :
                    '<button class="btn-admin btn-admin-danger" onclick="banUser(\'' + user.id + '\')"><i class="ti ti-ban"></i></button>';
                var date = user.createdAt ? new Date(user.createdAt).toLocaleDateString('zh-CN') : '-';

                var avUrl = user.avatar || '../images/default-avatar.png';
                if (avUrl.indexOf('data:') !== 0 && avUrl.indexOf('http') !== 0) avUrl = '../' + avUrl;
                html += '<tr data-status="' + status + '">' +
                    '<td><div class="user-cell"><img src="' + avUrl + '" alt=""> ' + (user.username || '未知') + '</div></td>' +
                    '<td>' + (user.email || '-') + '</td>' +
                    '<td>' + date + '</td>' +
                    '<td>' + userPosts + '</td>' +
                    '<td>' + userProducts + '</td>' +
                    '<td>' + statusBadge + '</td>' +
                    '<td><button class="btn-admin btn-admin-outline" onclick="viewUser(' + index + ')"><i class="ti ti-eye"></i></button> ' + action + '</td>' +
                    '</tr>';
            });
            tbody.innerHTML = html;
            document.getElementById('paginationInfo').textContent = '显示 1-' + users.length + ' / 共 ' + users.length + ' 条';
        }

        document.getElementById('userFilter').addEventListener('change', function() {
            var filter = this.value;
            document.querySelectorAll('#userTableBody tr').forEach(function(row) {
                if (filter === 'all' || row.dataset.status === filter) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        });

        document.getElementById('userSearch').addEventListener('input', function() {
            var keyword = this.value.toLowerCase();
            document.querySelectorAll('#userTableBody tr').forEach(function(row) {
                var text = row.textContent.toLowerCase();
                row.style.display = text.includes(keyword) ? '' : 'none';
            });
        });

        function viewUser(index) {
            var users = JSON.parse(localStorage.getItem('users') || '[]');
            var user = users[index];
            if (!user) return;
            var statusBadge = user.status === 'banned' ? '<span class="badge badge-danger"><i class="ti ti-user-off" style="margin-right:0.25rem"></i>封禁</span>' : '<span class="badge badge-success"><i class="ti ti-user-check" style="margin-right:0.25rem"></i>正常</span>';
            document.getElementById('userDetailGrid').innerHTML =
                '<div class="detail-item"><div class="label">用户名</div><div class="value">' + (user.username || '-') + '</div></div>' +
                '<div class="detail-item"><div class="label">邮箱</div><div class="value">' + (user.email || '-') + '</div></div>' +
                '<div class="detail-item"><div class="label">注册时间</div><div class="value">' + (user.createdAt ? new Date(user.createdAt).toLocaleString('zh-CN') : '-') + '</div></div>' +
                '<div class="detail-item"><div class="label">状态</div><div class="value">' + statusBadge + '</div></div>' +
                '<div class="detail-item detail-full"><div class="label">个人简介</div><div class="value">' + (user.bio || '暂无简介') + '</div></div>';
            document.getElementById('userModal').classList.add('show');
        }

        function closeModal() { document.getElementById('userModal').classList.remove('show'); }

        function banUser(id) {
            if (!confirm('确定要封禁该用户吗？')) return;
            var users = JSON.parse(localStorage.getItem('users') || '[]');
            var user = users.find(function(u) { return u.id === id; });
            if (user) {
                user.status = 'banned';
                localStorage.setItem('users', JSON.stringify(users));
                loadUsers();
                alert('用户已封禁');
            }
        }

        function unbanUser(id) {
            var users = JSON.parse(localStorage.getItem('users') || '[]');
            var user = users.find(function(u) { return u.id === id; });
            if (user) {
                user.status = 'active';
                localStorage.setItem('users', JSON.stringify(users));
                loadUsers();
                alert('用户已解封');
            }
        }

        loadUsers();
    </script>
</body>
</html>

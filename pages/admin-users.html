<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 社区平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="../index.html"><i class="ti ti-brand-community" style="margin-right:0.375rem"></i>社区平台</a>
        </div>
        <div class="nav-menu" id="navMenu">
            <ul class="nav-links">
                <li><a href="../index.html"><i class="ti ti-home"></i> 首页</a></li>
                <li><a href="forum.html"><i class="ti ti-message-circle"></i> 论坛</a></li>
                <li><a href="market.html"><i class="ti ti-shopping-bag"></i> 市场</a></li>
                <li><a href="messages.html"><i class="ti ti-mail"></i> 消息</a></li>
                <li><a href="admin.html"><i class="ti ti-dashboard"></i> 管理</a></li>
            </ul>
        </div>
        <div class="nav-toggle" id="navToggle">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div style="max-width:1200px;margin:0 auto;padding:1.5rem 1rem">
        <div class="forum-layout">
            <main>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
                    <h2 style="font-size:1.25rem;font-weight:600"><i class="ti ti-users" style="margin-right:0.375rem"></i>用户管理</h2>
                </div>

                <div class="stats-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="ti ti-users"></i></div>
                        <div class="stat-value">128</div>
                        <div class="stat-label">总用户数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="ti ti-user-check"></i></div>
                        <div class="stat-value">120</div>
                        <div class="stat-label">正常用户</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="ti ti-user-off"></i></div>
                        <div class="stat-value">5</div>
                        <div class="stat-label">被封禁</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="ti ti-user-plus"></i></div>
                        <div class="stat-value">12</div>
                        <div class="stat-label">本周注册</div>
                    </div>
                </div>

                <div class="admin-card">
                    <div class="admin-card-header">
                        <h2><i class="ti ti-list" style="margin-right:0.375rem"></i>用户列表</h2>
                        <div class="card-actions">
                            <input type="text" class="admin-search" placeholder="搜索用户..." id="userSearch">
                            <select class="admin-filter" id="userFilter">
                                <option value="all">全部状态</option>
                                <option value="active">正常</option>
                                <option value="banned">封禁</option>
                                <option value="inactive">不活跃</option>
                            </select>
                        </div>
                    </div>
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>用户</th>
                                <th>邮箱</th>
                                <th>注册时间</th>
                                <th>帖子数</th>
                                <th>商品数</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                    <div class="admin-pagination">
                        <span class="pagination-info" id="paginationInfo">显示 0 / 共 0 条</span>
                        <div class="pagination-btns">
                            <button disabled>&laquo;</button>
                            <button class="active">1</button>
                            <button>&raquo;</button>
                        </div>
                    </div>
                </div>
            </main>

            <aside class="forum-sidebar">
                <div class="admin-card" style="margin-bottom:1rem">
                    <div class="admin-card-header">
                        <h2><i class="ti ti-chart-bar" style="margin-right:0.375rem"></i>用户统计</h2>
                    </div>
                    <div style="padding:1rem">
                        <div style="display:flex;flex-direction:column;gap:0.75rem">
                            <div style="display:flex;justify-content:space-between;align-items:center">
                                <span style="color:var(--text-secondary)"><i class="ti ti-users" style="margin-right:0.25rem"></i>总用户</span>
                                <span style="font-weight:600" id="statTotal">0</span>
                            </div>
                            <div style="display:flex;justify-content:space-between;align-items:center">
                                <span style="color:var(--text-secondary)"><i class="ti ti-user-check" style="margin-right:0.25rem"></i>正常</span>
                                <span style="font-weight:600;color:var(--success-color)" id="statActive">0</span>
                            </div>
                            <div style="display:flex;justify-content:space-between;align-items:center">
                                <span style="color:var(--text-secondary)"><i class="ti ti-user-off" style="margin-right:0.25rem"></i>封禁</span>
                                <span style="font-weight:600;color:var(--danger-color)" id="statBanned">0</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="admin-card">
                    <div class="admin-card-header">
                        <h2><i class="ti ti-filter" style="margin-right:0.375rem"></i>快捷操作</h2>
                    </div>
                    <div style="padding:1rem">
                        <div style="display:flex;flex-direction:column;gap:0.5rem">
                            <a href="admin.html" class="btn btn-ghost" style="width:100%;justify-content:flex-start"><i class="ti ti-dashboard" style="margin-right:0.375rem"></i> 仪表盘</a>
                            <a href="admin-forum.html" class="btn btn-ghost" style="width:100%;justify-content:flex-start"><i class="ti ti-message-circle" style="margin-right:0.375rem"></i> 论坛管理</a>
                            <a href="admin-market.html" class="btn btn-ghost" style="width:100%;justify-content:flex-start"><i class="ti ti-shopping-bag" style="margin-right:0.375rem"></i> 商城管理</a>
                            <a href="admin-settings.html" class="btn btn-ghost" style="width:100%;justify-content:flex-start"><i class="ti ti-settings" style="margin-right:0.375rem"></i> 网站设置</a>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <div class="admin-modal-overlay" id="userModal">
        <div class="admin-modal">
            <div class="admin-modal-header">
                <h3><i class="ti ti-user" style="margin-right:0.375rem"></i>用户详情</h3>
                <button class="admin-modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
            </div>
            <div class="admin-modal-body">
                <div class="detail-grid">
                    <div class="detail-item">
                        <div class="label">用户名</div>
                        <div class="value">小明</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">邮箱</div>
                        <div class="value">xiaoming@email.com</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">注册时间</div>
                        <div class="value">2026-01-15</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">状态</div>
                        <div class="value"><span class="badge badge-success">正常</span></div>
                    </div>
                    <div class="detail-item">
                        <div class="label">帖子数</div>
                        <div class="value">12</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">商品数</div>
                        <div class="value">3</div>
                    </div>
                    <div class="detail-item detail-full">
                        <div class="label">个人简介</div>
                        <div class="value">热爱技术，喜欢分享的社区用户</div>
                    </div>
                </div>
            </div>
            <div class="admin-modal-footer">
                <button class="btn btn-ghost" onclick="closeModal()"><i class="ti ti-x" style="margin-right:0.25rem"></i>关闭</button>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = 'admin-login.html';
        }
        document.getElementById('adminLogout') && document.getElementById('adminLogout').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'admin-login.html';
        });

        function loadUsers() {
            var users = JSON.parse(localStorage.getItem('users') || '[]');
            var tbody = document.getElementById('userTableBody');
            var posts = JSON.parse(localStorage.getItem('posts') || '[]');
            var products = JSON.parse(localStorage.getItem('products') || '[]');

            var total = users.length;
            var active = users.filter(function(u) { return u.status !== 'banned'; }).length;
            var banned = users.filter(function(u) { return u.status === 'banned'; }).length;
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statActive').textContent = active;
            document.getElementById('statBanned').textContent = banned;
            document.querySelectorAll('.stat-card .stat-value')[0].textContent = total;
            document.querySelectorAll('.stat-card .stat-value')[1].textContent = active;
            document.querySelectorAll('.stat-card .stat-value')[2].textContent = banned;

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state"><div class="icon"><i class="ti ti-users"></i></div><p>暂无注册用户</p></td></tr>';
                document.getElementById('paginationInfo').textContent = '显示 0 / 共 0 条';
                return;
            }

            var html = '';
            users.forEach(function(user, index) {
                var userPosts = posts.filter(function(p) { return p.authorId === user.id; }).length;
                var userProducts = products.filter(function(p) { return p.sellerId === user.id; }).length;
                var status = user.status === 'banned' ? 'banned' : 'active';
                var statusBadge = status === 'banned' ?
                    '<span class="badge badge-danger"><i class="ti ti-user-off" style="margin-right:0.25rem"></i>封禁</span>' :
                    '<span class="badge badge-success"><i class="ti ti-user-check" style="margin-right:0.25rem"></i>正常</span>';
                var action = status === 'banned' ?
                    '<button class="btn-admin btn-admin-success" onclick="unbanUser(\'' + user.id + '\')"><i class="ti ti-check" style="margin-right:0.25rem"></i>解封</button>' :
                    '<button class="btn-admin btn-admin-danger" onclick="banUser(\'' + user.id + '\')"><i class="ti ti-ban" style="margin-right:0.25rem"></i>封禁</button>';
                var date = user.createdAt ? new Date(user.createdAt).toLocaleDateString('zh-CN') : '-';

                var avUrl = user.avatar || 'images/default-avatar.png';
                if (avUrl.indexOf('data:') !== 0) avUrl = '../' + avUrl;
                html += '<tr data-status="' + status + '">' +
                    '<td><div class="user-cell"><img src="' + avUrl + '" class="avatar-sm" alt=""> ' + (user.username || '未知') + '</div></td>' +
                    '<td>' + (user.email || '-') + '</td>' +
                    '<td>' + date + '</td>' +
                    '<td>' + userPosts + '</td>' +
                    '<td>' + userProducts + '</td>' +
                    '<td>' + statusBadge + '</td>' +
                    '<td><button class="btn-admin btn-admin-outline" onclick="viewUser(' + index + ')"><i class="ti ti-eye" style="margin-right:0.25rem"></i>查看</button> ' + action + '</td>' +
                    '</tr>';
            });
            tbody.innerHTML = html;
            document.getElementById('paginationInfo').textContent = '显示 1-' + users.length + ' / 共 ' + users.length + ' 条';
        }

        document.getElementById('userFilter').addEventListener('change', function() {
            var filter = this.value;
            document.querySelectorAll('#userTableBody tr').forEach(function(row) {
                if (filter === 'all' || row.dataset.status === filter) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        });

        document.getElementById('userSearch').addEventListener('input', function() {
            var keyword = this.value.toLowerCase();
            document.querySelectorAll('#userTableBody tr').forEach(function(row) {
                var text = row.textContent.toLowerCase();
                row.style.display = text.includes(keyword) ? '' : 'none';
            });
        });

        function viewUser(index) {
            var users = JSON.parse(localStorage.getItem('users') || '[]');
            var user = users[index];
            if (!user) return;
            document.getElementById('userModal').querySelector('.detail-grid').innerHTML =
                '<div class="detail-item"><div class="label">用户名</div><div class="value"><i class="ti ti-user" style="margin-right:0.25rem"></i>' + (user.username || '-') + '</div></div>' +
                '<div class="detail-item"><div class="label">邮箱</div><div class="value"><i class="ti ti-mail" style="margin-right:0.25rem"></i>' + (user.email || '-') + '</div></div>' +
                '<div class="detail-item"><div class="label">注册时间</div><div class="value"><i class="ti ti-calendar" style="margin-right:0.25rem"></i>' + (user.createdAt ? new Date(user.createdAt).toLocaleString('zh-CN') : '-') + '</div></div>' +
                '<div class="detail-item"><div class="label">状态</div><div class="value">' + (user.status === 'banned' ? '<span class="badge badge-danger"><i class="ti ti-user-off" style="margin-right:0.25rem"></i>封禁</span>' : '<span class="badge badge-success"><i class="ti ti-user-check" style="margin-right:0.25rem"></i>正常</span>') + '</div></div>' +
                '<div class="detail-item detail-full"><div class="label">个人简介</div><div class="value"><i class="ti ti-note" style="margin-right:0.25rem"></i>' + (user.bio || '暂无简介') + '</div></div>';
            document.getElementById('userModal').classList.add('show');
        }

        function closeModal() { document.getElementById('userModal').classList.remove('show'); }

        function banUser(id) {
            if (!confirm('确定要封禁该用户吗？')) return;
            var users = JSON.parse(localStorage.getItem('users') || '[]');
            var user = users.find(function(u) { return u.id === id; });
            if (user) {
                user.status = 'banned';
                localStorage.setItem('users', JSON.stringify(users));
                loadUsers();
                alert('用户已封禁');
            }
        }

        function unbanUser(id) {
            var users = JSON.parse(localStorage.getItem('users') || '[]');
            var user = users.find(function(u) { return u.id === id; });
            if (user) {
                user.status = 'active';
                localStorage.setItem('users', JSON.stringify(users));
                loadUsers();
                alert('用户已解封');
            }
        }

        loadUsers();
    </script>
</body>
</html>

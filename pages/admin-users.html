<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 社区平台</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>社区平台</h2>
                <p>管理后台</p>
            </div>
            <nav class="sidebar-nav">
                <a href="admin.html"><span class="icon">📊</span> 仪表盘</a>
                <a href="admin-forum.html"><span class="icon">💬</span> 论坛管理</a>
                <a href="admin-market.html"><span class="icon">🛍️</span> 商城管理</a>
                <a href="admin-users.html" class="active"><span class="icon">👥</span> 用户管理</a>
                <div class="sidebar-section">系统</div>
                <a href="admin-settings.html"><span class="icon">⚙️</span> 网站设置</a>
                <a href="../index.html" target="_blank"><span class="icon">🌐</span> 查看前台</a>
                <a href="#" id="adminLogout"><span class="icon">🚪</span> 退出登录</a>
            </nav>
        </aside>

        <main class="admin-main">
            <div class="admin-topbar">
                <h1>用户管理</h1>
                <div class="topbar-actions">
                    <span class="topbar-user">管理员</span>
                </div>
            </div>

            <div class="admin-content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">👥</div>
                        <div class="stat-value">128</div>
                        <div class="stat-label">总用户数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">✅</div>
                        <div class="stat-value">120</div>
                        <div class="stat-label">正常用户</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">⚠️</div>
                        <div class="stat-value">5</div>
                        <div class="stat-label">被封禁</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🆕</div>
                        <div class="stat-value">12</div>
                        <div class="stat-label">本周注册</div>
                    </div>
                </div>

                <div class="admin-card">
                    <div class="admin-card-header">
                        <h2>用户列表</h2>
                        <div class="card-actions">
                            <input type="text" class="admin-search" placeholder="搜索用户..." id="userSearch">
                            <select class="admin-filter" id="userFilter">
                                <option value="all">全部状态</option>
                                <option value="active">正常</option>
                                <option value="banned">封禁</option>
                                <option value="inactive">不活跃</option>
                            </select>
                        </div>
                    </div>
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>用户</th>
                                <th>邮箱</th>
                                <th>注册时间</th>
                                <th>帖子数</th>
                                <th>商品数</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                    <div class="admin-pagination">
                        <span class="pagination-info" id="paginationInfo">显示 0 / 共 0 条</span>
                        <div class="pagination-btns">
                            <button disabled>&laquo;</button>
                            <button class="active">1</button>
                            <button>&raquo;</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="admin-modal-overlay" id="userModal">
        <div class="admin-modal">
            <div class="admin-modal-header">
                <h3>用户详情</h3>
                <button class="admin-modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="admin-modal-body">
                <div class="detail-grid">
                    <div class="detail-item">
                        <div class="label">用户名</div>
                        <div class="value">小明</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">邮箱</div>
                        <div class="value">xiaoming@email.com</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">注册时间</div>
                        <div class="value">2026-01-15</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">状态</div>
                        <div class="value"><span class="badge badge-success">正常</span></div>
                    </div>
                    <div class="detail-item">
                        <div class="label">帖子数</div>
                        <div class="value">12</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">商品数</div>
                        <div class="value">3</div>
                    </div>
                    <div class="detail-item detail-full">
                        <div class="label">个人简介</div>
                        <div class="value">热爱技术，喜欢分享的社区用户</div>
                    </div>
                </div>
            </div>
            <div class="admin-modal-footer">
                <button class="btn-admin btn-admin-outline" onclick="closeModal()">关闭</button>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = 'admin-login.html';
        }
        document.getElementById('adminLogout').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'admin-login.html';
        });

        function loadUsers() {
            var users = JSON.parse(localStorage.getItem('users') || '[]');
            var tbody = document.getElementById('userTableBody');
            var posts = JSON.parse(localStorage.getItem('posts') || '[]');
            var products = JSON.parse(localStorage.getItem('products') || '[]');

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state"><div class="icon">👥</div><p>暂无注册用户</p></td></tr>';
                document.getElementById('paginationInfo').textContent = '显示 0 / 共 0 条';
                return;
            }

            var html = '';
            users.forEach(function(user, index) {
                var userPosts = posts.filter(function(p) { return p.authorId === user.id; }).length;
                var userProducts = products.filter(function(p) { return p.sellerId === user.id; }).length;
                var status = user.status === 'banned' ? 'banned' : 'active';
                var statusBadge = status === 'banned' ?
                    '<span class="badge badge-danger">封禁</span>' :
                    '<span class="badge badge-success">正常</span>';
                var action = status === 'banned' ?
                    '<button class="btn-admin btn-admin-success" onclick="unbanUser(\'' + user.id + '\')">解封</button>' :
                    '<button class="btn-admin btn-admin-danger" onclick="banUser(\'' + user.id + '\')">封禁</button>';
                var date = user.createdAt ? new Date(user.createdAt).toLocaleDateString('zh-CN') : '-';

                html += '<tr data-status="' + status + '">' +
                    '<td><div class="user-cell"><img src="../' + (user.avatar || 'images/default-avatar.png') + '" class="avatar-sm" alt=""> ' + (user.username || '未知') + '</div></td>' +
                    '<td>' + (user.email || '-') + '</td>' +
                    '<td>' + date + '</td>' +
                    '<td>' + userPosts + '</td>' +
                    '<td>' + userProducts + '</td>' +
                    '<td>' + statusBadge + '</td>' +
                    '<td><button class="btn-admin btn-admin-outline" onclick="viewUser(' + index + ')">查看</button> ' + action + '</td>' +
                    '</tr>';
            });
            tbody.innerHTML = html;
            document.getElementById('paginationInfo').textContent = '显示 1-' + users.length + ' / 共 ' + users.length + ' 条';
        }

        document.getElementById('userFilter').addEventListener('change', function() {
            var filter = this.value;
            document.querySelectorAll('#userTableBody tr').forEach(function(row) {
                if (filter === 'all' || row.dataset.status === filter) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        });

        document.getElementById('userSearch').addEventListener('input', function() {
            var keyword = this.value.toLowerCase();
            document.querySelectorAll('#userTableBody tr').forEach(function(row) {
                var text = row.textContent.toLowerCase();
                row.style.display = text.includes(keyword) ? '' : 'none';
            });
        });

        function viewUser(index) {
            var users = JSON.parse(localStorage.getItem('users') || '[]');
            var user = users[index];
            if (!user) return;
            document.getElementById('userModal').querySelector('.detail-grid').innerHTML =
                '<div class="detail-item"><div class="label">用户名</div><div class="value">' + (user.username || '-') + '</div></div>' +
                '<div class="detail-item"><div class="label">邮箱</div><div class="value">' + (user.email || '-') + '</div></div>' +
                '<div class="detail-item"><div class="label">注册时间</div><div class="value">' + (user.createdAt ? new Date(user.createdAt).toLocaleString('zh-CN') : '-') + '</div></div>' +
                '<div class="detail-item"><div class="label">状态</div><div class="value">' + (user.status === 'banned' ? '<span class="badge badge-danger">封禁</span>' : '<span class="badge badge-success">正常</span>') + '</div></div>' +
                '<div class="detail-item detail-full"><div class="label">个人简介</div><div class="value">' + (user.bio || '暂无简介') + '</div></div>';
            document.getElementById('userModal').classList.add('show');
        }

        function closeModal() { document.getElementById('userModal').classList.remove('show'); }

        function banUser(id) {
            if (!confirm('确定要封禁该用户吗？')) return;
            var users = JSON.parse(localStorage.getItem('users') || '[]');
            var user = users.find(function(u) { return u.id === id; });
            if (user) {
                user.status = 'banned';
                localStorage.setItem('users', JSON.stringify(users));
                loadUsers();
                alert('用户已封禁');
            }
        }

        function unbanUser(id) {
            var users = JSON.parse(localStorage.getItem('users') || '[]');
            var user = users.find(function(u) { return u.id === id; });
            if (user) {
                user.status = 'active';
                localStorage.setItem('users', JSON.stringify(users));
                loadUsers();
                alert('用户已解封');
            }
        }

        loadUsers();
    </script>
</body>
</html>

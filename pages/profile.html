<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="用户个人资料 - 查看用户信息、帖子、商品">
    <title>个人资料 - 社区平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="../index.html"><i class="ti ti-brand-community" style="margin-right:0.375rem"></i>社区平台</a>
        </div>
        <div class="nav-search" id="navSearch">
            <div class="input-icon">
                <i class="ti ti-search"></i>
                <input type="search" placeholder="搜索..." id="searchInput">
            </div>
        </div>
        <div class="nav-menu" id="navMenu">
            <ul class="nav-links">
                <li><a href="../index.html"><i class="ti ti-home"></i> 首页</a></li>
                <li><a href="forum.html"><i class="ti ti-message-circle"></i> 论坛</a></li>
                <li><a href="market.html"><i class="ti ti-shopping-bag"></i> 市场</a></li>
                <li><a href="messages.html"><i class="ti ti-mail"></i> 消息</a></li>
            </ul>
        </div>
        <div class="nav-user">
            <div class="user-actions" id="userActions">
                <button class="btn btn-ghost" id="loginBtn">登录</button>
                <button class="btn btn-primary" id="registerBtn">注册</button>
            </div>
            <div class="user-profile" id="userProfile" style="display:none;">
                <img src="../images/default-avatar.png" alt="头像" id="userAvatar">
                <div class="user-dropdown">
                    <a href="profile.html"><i class="ti ti-user"></i> 个人资料</a>
                    <a href="settings.html"><i class="ti ti-settings"></i> 设置</a>
                    <a href="#" id="logoutBtn"><i class="ti ti-logout"></i> 退出登录</a>
                </div>
            </div>
        </div>
        <div class="nav-toggle" id="navToggle">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div style="max-width:1000px;margin:0 auto;padding:1.5rem 1rem">
        <!-- 个人信息头部 -->
        <div class="admin-card" style="margin-bottom:1.5rem">
            <div style="padding:2rem;display:flex;gap:2rem;align-items:flex-start">
                <img src="../images/default-avatar.png" alt="头像" id="profileAvatar" style="width:100px;height:100px;border-radius:50%;border:4px solid var(--border-color)">
                <div style="flex:1">
                    <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:0.5rem;color:var(--text-primary)" id="profileUsername">加载中...</h1>
                    <p style="color:var(--text-secondary);margin-bottom:1rem;line-height:1.6" id="profileBio">这个人很懒，什么都没写</p>
                    <div style="display:flex;gap:2rem;margin-bottom:1rem">
                        <div style="text-align:center">
                            <div style="font-size:1.25rem;font-weight:700;color:var(--text-primary)" id="postsCount">0</div>
                            <div style="font-size:0.875rem;color:var(--text-secondary)">帖子</div>
                        </div>
                        <div style="text-align:center">
                            <div style="font-size:1.25rem;font-weight:700;color:var(--text-primary)" id="productsCount">0</div>
                            <div style="font-size:0.875rem;color:var(--text-secondary)">商品</div>
                        </div>
                        <div style="text-align:center">
                            <div style="font-size:1.25rem;font-weight:700;color:var(--text-primary)" id="followersCount">0</div>
                            <div style="font-size:0.875rem;color:var(--text-secondary)">粉丝</div>
                        </div>
                        <div style="text-align:center">
                            <div style="font-size:1.25rem;font-weight:700;color:var(--text-primary)" id="followingCount">0</div>
                            <div style="font-size:0.875rem;color:var(--text-secondary)">关注</div>
                        </div>
                    </div>
                    <div style="display:flex;gap:0.75rem">
                        <button class="btn btn-primary" id="followBtn" style="display:none"><i class="ti ti-user-plus"></i> 关注</button>
                        <button class="btn btn-outline" id="messageBtn" style="display:none"><i class="ti ti-mail"></i> 发消息</button>
                        <button class="btn btn-outline" id="editProfileBtn" style="display:none"><i class="ti ti-pencil"></i> 编辑资料</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 标签页 -->
        <div style="display:flex;border-bottom:1px solid var(--border-color);margin-bottom:1.5rem">
            <button class="profile-tab active" data-tab="posts" style="padding:0.75rem 1.25rem;border:none;background:none;color:var(--text-secondary);cursor:pointer;font-weight:500;border-bottom:2px solid transparent">
                <i class="ti ti-message-circle"></i> 帖子
            </button>
            <button class="profile-tab" data-tab="products" style="padding:0.75rem 1.25rem;border:none;background:none;color:var(--text-secondary);cursor:pointer;font-weight:500;border-bottom:2px solid transparent">
                <i class="ti ti-shopping-bag"></i> 商品
            </button>
            <button class="profile-tab" data-tab="likes" style="padding:0.75rem 1.25rem;border:none;background:none;color:var(--text-secondary);cursor:pointer;font-weight:500;border-bottom:2px solid transparent">
                <i class="ti ti-thumb-up"></i> 点赞
            </button>
            <button class="profile-tab" data-tab="bookmarks" style="padding:0.75rem 1.25rem;border:none;background:none;color:var(--text-secondary);cursor:pointer;font-weight:500;border-bottom:2px solid transparent">
                <i class="ti ti-bookmark"></i> 收藏
            </button>
        </div>

        <!-- 内容区 -->
        <div id="profileContent"></div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 社区平台. 保留所有权利.</p>
            </div>
        </div>
    </footer>

    <!-- 编辑资料模态框 -->
    <div class="modal" id="editProfileModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2><i class="ti ti-pencil" style="margin-right:0.375rem"></i>编辑资料</h2>
            <form id="editProfileForm">
                <div class="form-group">
                    <label for="editUsername"><i class="ti ti-user"></i> 用户名</label>
                    <input type="text" id="editUsername" required>
                </div>
                <div class="form-group">
                    <label for="editBio"><i class="ti ti-file-text"></i> 个人简介</label>
                    <textarea id="editBio" rows="3" placeholder="介绍一下自己..."></textarea>
                </div>
                <div class="form-group">
                    <label for="editAvatar"><i class="ti ti-photo"></i> 头像</label>
                    <input type="file" id="editAvatar" accept="image/*">
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="ti ti-check"></i> 保存修改
                </button>
            </form>
        </div>
    </div>

    <script src="../js/config.js?v=5"></script>
    <script>var _sv="5";var _cv=localStorage.getItem("site_version");if(_cv&&_cv!==_sv){localStorage.setItem("site_version",_sv);location.href=location.href.split("?")[0]+"?_t="+Date.now();}else{localStorage.setItem("site_version",_sv);}</script>
    <script src="../js/auth.js?v=5"></script>
    <script src="../js/profile.js?v=5"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{var t=JSON.parse(localStorage.getItem('site_theme')||'{}');var r=document.documentElement;if(t.primaryColor){r.style.setProperty('--primary-color',t.primaryColor);var c=t.primaryColor;if(c[0]==='#'){var R=parseInt(c.slice(1,3),16),G=parseInt(c.slice(3,5),16),B=parseInt(c.slice(5,7),16);r.style.setProperty('--primary-dark','rgb('+(R>15?R-15:0)+','+(G>15?G-15:0)+','+(B>15?B-15:0)+')');r.style.setProperty('--primary-light','rgb('+(R<236?R+20:255)+','+(G<236?G+20:255)+','+(B<236?B+20:255)+')');}}if(t.secondaryColor)r.style.setProperty('--secondary-color',t.secondaryColor);if(t.successColor)r.style.setProperty('--success-color',t.successColor);if(t.warningColor)r.style.setProperty('--warning-color',t.warningColor);if(t.dangerColor)r.style.setProperty('--danger-color',t.dangerColor);if(t.infoColor)r.style.setProperty('--info-color',t.infoColor);if(t.borderRadius){r.style.setProperty('--border-radius',t.borderRadius);r.style.setProperty('--border-radius-lg',(parseFloat(t.borderRadius)*1.5)+'rem');}if(t.fontFamily)r.style.setProperty('--font-family',t.fontFamily);if(t.bgPrimary)r.style.setProperty('--bg-primary',t.bgPrimary);if(t.bgSecondary)r.style.setProperty('--bg-secondary',t.bgSecondary);if(t.textPrimary)r.style.setProperty('--text-primary',t.textPrimary);if(t.textSecondary)r.style.setProperty('--text-secondary',t.textSecondary);}catch(e){}</script>
    <script>var _sv="7";var _cv=localStorage.getItem("site_version");if(_cv&&_cv!==_sv){localStorage.setItem("site_version",_sv);location.replace(location.pathname+"?_t="+Date.now());}else{localStorage.setItem("site_version",_sv);}</script>
    <title>论坛 - 社区平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-brand">
            <a href="../index.html"><i class="ti ti-brand-community" style="margin-right:0.375rem"></i><span data-setting="siteName">社区平台</span></a>
        </div>
        <div class="nav-search" id="navSearch">
            <div class="input-icon">
                <i class="ti ti-search"></i>
                <input type="search" placeholder="搜索帖子..." id="searchInput">
            </div>
        </div>
        <div class="nav-menu" id="navMenu">
            <ul class="nav-links">
                <li><a href="../index.html"><i class="ti ti-home"></i> <span data-copy="navHome">首页</span></a></li>
                <li><a href="forum.html" class="active"><i class="ti ti-message-circle"></i> <span data-copy="navForum">论坛</span></a></li>
                <li><a href="market.html"><i class="ti ti-shopping-bag"></i> <span data-copy="navMarket">市场</span></a></li>
                <li><a href="messages.html"><i class="ti ti-mail"></i> <span data-copy="navMessages">消息</span></a></li>
            </ul>
        </div>
        <div class="nav-user">
            <div class="user-actions" id="userActions">
                <button class="btn btn-ghost" id="loginBtn">登录</button>
                <button class="btn btn-primary" id="registerBtn">注册</button>
            </div>
            <div class="user-profile" id="userProfile" style="display:none;">
                <img src="../images/default-avatar.png" alt="头像" id="userAvatar">
                <div class="user-dropdown">
                    <a href="profile.html"><i class="ti ti-user"></i> 个人资料</a>
                    <a href="settings.html"><i class="ti ti-settings"></i> 设置</a>
                    <a href="admin.html" class="admin-link" style="display:none"><i class="ti ti-dashboard"></i> 管理后台</a>
                    <a href="#" id="logoutBtn"><i class="ti ti-logout"></i> 退出登录</a>
                </div>
            </div>
        </div>
        <div class="nav-toggle" id="navToggle">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <!-- 主内容 -->
    <div style="max-width:1200px;margin:0 auto;padding:1.5rem 1rem">
        <div class="forum-layout">
            <!-- 帖子列表 -->
            <main>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
                    <h2 style="font-size:1.25rem;font-weight:600"><i class="ti ti-message-circle" style="margin-right:0.375rem"></i>论坛</h2>
                    <button class="btn btn-primary" id="newPostBtn">
                        <i class="ti ti-plus"></i> 发布帖子
                    </button>
                </div>

                <!-- 分类筛选 -->
                <div class="forum-filters" id="categoryFilters"></div>

                <!-- 排序筛选 -->
                <div style="display:flex;gap:0.5rem;margin-bottom:1rem">
                    <button class="forum-filter-btn active" data-filter="latest">
                        <i class="ti ti-clock"></i> 最新
                    </button>
                    <button class="forum-filter-btn" data-filter="hot">
                        <i class="ti ti-flame"></i> 热门
                    </button>
                    <button class="forum-filter-btn" data-filter="essence">
                        <i class="ti ti-star"></i> 精华
                    </button>
                </div>

                <!-- 帖子列表 -->
                <div class="posts-grid" id="postsList"></div>

                <!-- 分页 -->
                <div id="pagination" style="margin-top:1.5rem;text-align:center"></div>
            </main>

            <!-- 侧边栏 -->
            <aside class="forum-sidebar">
                <!-- 论坛统计 -->
                <div class="admin-card" style="margin-bottom:1rem">
                    <div class="admin-card-header">
                        <h2><i class="ti ti-chart-bar" style="margin-right:0.375rem"></i>论坛统计</h2>
                    </div>
                    <div style="padding:1rem">
                        <div class="forum-stats" id="forumStats"></div>
                    </div>
                </div>

                <!-- 热门标签 -->
                <div class="admin-card">
                    <div class="admin-card-header">
                        <h2><i class="ti ti-tags" style="margin-right:0.375rem"></i>热门标签</h2>
                    </div>
                    <div style="padding:1rem">
                        <div id="hotTags" style="display:flex;flex-wrap:wrap;gap:0.375rem"></div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- 发帖模态框 -->
    <div class="modal" id="newPostModal">
        <div class="modal-content" style="max-width:600px">
            <span class="close-modal">&times;</span>
            <h2><i class="ti ti-pencil" style="margin-right:0.375rem"></i>发布新帖子</h2>
            <form id="newPostForm">
                <div class="form-group">
                    <label for="postTitle">标题</label>
                    <input type="text" id="postTitle" placeholder="输入帖子标题" required>
                </div>
                <div class="form-group">
                    <label for="postCategory">分类</label>
                    <select id="postCategory" required></select>
                </div>
                <div class="form-group">
                    <label for="postContent">内容</label>
                    <textarea id="postContent" rows="8" placeholder="分享你的想法..." required></textarea>
                </div>
                <div class="form-group">
                    <label>图片（可选，最多9张）</label>
                    <input type="file" id="postImages" accept="image/*" multiple style="display:none">
                    <button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById('postImages').click()">
                        <i class="ti ti-photo"></i> 添加图片
                    </button>
                    <div id="imagePreview" style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.5rem"></div>
                </div>
                <div style="display:flex;gap:0.75rem;justify-content:flex-end">
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('newPostModal').classList.remove('show')">取消</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="ti ti-send"></i> 发布
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 登录模态框 -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2><i class="ti ti-login" style="margin-right:0.375rem"></i>登录</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">邮箱</label>
                    <input type="email" id="loginEmail" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">登录</button>
            </form>
            <div class="social-divider"><span>或使用以下方式登录</span></div>
            <div class="social-login-btns">
                <button class="social-btn wechat" onclick="socialLogin('wechat')">微信登录</button>
                <button class="social-btn qq" onclick="socialLogin('qq')">QQ登录</button>
            </div>
            <div class="modal-footer"><p>还没有账号？<a href="#" id="showRegister">立即注册</a></p></div>
        </div>
    </div>

    <!-- 注册模态框 -->
    <div class="modal" id="registerModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2><i class="ti ti-user-plus" style="margin-right:0.375rem"></i>注册</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="registerUsername">用户名</label>
                    <input type="text" id="registerUsername" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="registerEmail">邮箱</label>
                    <input type="email" id="registerEmail" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label for="registerPassword">密码</label>
                    <input type="password" id="registerPassword" placeholder="至少6位密码" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="registerConfirmPassword">确认密码</label>
                    <input type="password" id="registerConfirmPassword" placeholder="再次输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">注册</button>
            </form>
            <div class="modal-footer"><p>已有账号？<a href="#" id="showLogin">立即登录</a></p></div>
        </div>
    </div>

    <script src="../js/config.js?v=7"></script>
    <script src="../js/auth.js?v=7"></script>
    <script src="../js/forum.js?v=7"></script>
</body>
</html>

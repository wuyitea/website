<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>展示页2管理</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">
    <link rel="stylesheet" href="../css/style.css?v=11">
    <link rel="stylesheet" href="../css/responsive.css?v=11">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i class="ti ti-brand-community"></i></div>
                <div>
                    <h2>社区平台</h2>
                    <p>管理后台</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="admin.html"><i class="ti ti-dashboard"></i> 仪表盘</a>
                <a href="admin-forum.html"><i class="ti ti-photo"></i> 论坛管理</a>
                <a href="admin-display1.html"><i class="ti ti-slideshow"></i> 展示页1</a>
                <a href="admin-display2.html" class="active"><i class="ti ti-device-desktop"></i> 展示页2</a>
                <div class="sidebar-nav-label">系统</div>
                <a href="admin-settings.html"><i class="ti ti-settings"></i> 网站设置</a>
                <a href="../index.html" target="_blank"><i class="ti ti-external-link"></i> 查看前台</a>
                <a href="#" id="adminLogout"><i class="ti ti-logout"></i> 退出登录</a>
            </nav>
            <div class="sidebar-user">
                <div class="sidebar-user-avatar"><i class="ti ti-user-circle"></i></div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name">管理员</div>
                    <div class="sidebar-user-role">超级管理员</div>
                </div>
            </div>
        </aside>

        <main class="admin-main">
            <div class="admin-topbar">
                <div class="admin-topbar-left">
                    <button class="admin-topbar-btn" id="sidebarToggle" style="display:none">
                        <i class="ti ti-menu-2" style="font-size:1.25rem"></i>
                    </button>
                    <h1>展示页2管理</h1>
                </div>
                <div class="admin-topbar-right">
                    <a href="forum.html" target="_blank" class="btn-admin btn-admin-outline"><i class="ti ti-external-link" style="margin-right:0.375rem"></i>查看前台</a>
                </div>
            </div>

            <div class="admin-content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(79,70,229,0.1);color:var(--primary-color)">
                            <i class="ti ti-photo"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" id="statSlides">0</div>
                            <div class="stat-label">轮播内容</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(16,185,129,0.1);color:var(--success-color)">
                            <i class="ti ti-link"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" id="statLinks">0</div>
                            <div class="stat-label">带链接</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(245,158,11,0.1);color:var(--warning-color)">
                            <i class="ti ti-video"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" id="statVideos">0</div>
                            <div class="stat-label">视频</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(139,92,246,0.1);color:#8b5cf6">
                            <i class="ti ti-ruler-vertical"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" id="statHeight">500</div>
                            <div class="stat-label">展示高度</div>
                        </div>
                    </div>
                </div>

                <div style="display:grid;grid-template-columns:1fr 340px;gap:1.5rem;align-items:start">
                    <div>
                        <div class="admin-card">
                            <div class="admin-card-header">
                                <h2><i class="ti ti-slideshow" style="margin-right:0.375rem"></i>轮播内容管理</h2>
                                <button class="btn-admin btn-admin-primary" onclick="addSlide()"><i class="ti ti-plus" style="margin-right:0.25rem"></i>添加内容</button>
                            </div>
                            <div id="slideList" style="padding:1rem"></div>
                        </div>

                        <div class="admin-card" style="margin-top:1.5rem">
                            <div class="admin-card-header">
                                <h2><i class="ti ti-player-play" style="margin-right:0.375rem"></i>轮播设置</h2>
                            </div>
                            <div style="padding:1rem;display:flex;flex-wrap:wrap;gap:1.5rem;align-items:flex-end">
                                <div class="form-group" style="margin:0;min-width:200px">
                                    <label style="display:block;margin-bottom:0.375rem;font-weight:500;font-size:var(--font-size-sm)">展示高度（px）</label>
                                    <input type="number" id="forumHeight" value="500" min="200" max="1200" step="50" style="width:100%">
                                </div>
                                <div class="form-group" style="margin:0;min-width:200px">
                                    <label style="display:block;margin-bottom:0.375rem;font-weight:500;font-size:var(--font-size-sm)">轮播间隔（ms）</label>
                                    <input type="number" id="forumInterval" value="5000" min="1000" max="30000" step="500" style="width:100%">
                                </div>
                                <label class="toggle" style="margin-bottom:0.375rem">
                                    <input type="checkbox" checked id="forumAutoPlay">
                                    <span class="toggle-slider"></span>
                                </label>
                                <span style="font-size:var(--font-size-sm);margin-bottom:0.375rem">自动轮播</span>
                                <button class="btn-admin btn-admin-primary" onclick="saveAll()" style="margin-left:auto"><i class="ti ti-device-floppy" style="margin-right:0.375rem"></i>保存全部</button>
                            </div>
                        </div>
                    </div>

                    <div class="admin-card" style="position:sticky;top:1.5rem">
                        <div class="admin-card-header">
                            <h2><i class="ti ti-eye" style="margin-right:0.375rem"></i>实时预览</h2>
                        </div>
                        <div style="padding:1rem">
                            <div id="previewBox" style="width:100%;border-radius:var(--border-radius);overflow:hidden;background:#000;position:relative">
                                <div id="previewEmpty" style="padding:3rem;text-align:center;color:var(--text-light)">
                                    <i class="ti ti-photo" style="font-size:2.5rem;display:block;margin-bottom:0.75rem;opacity:0.4"></i>
                                    <p style="font-size:var(--font-size-sm)">暂无内容</p>
                                </div>
                                <div id="previewContent" style="display:none;position:relative;width:100%;overflow:hidden">
                                    <div id="previewTrack" style="display:flex;transition:transform 0.5s ease"></div>
                                </div>
                            </div>
                            <p id="previewInfo" style="font-size:var(--font-size-xs);color:var(--text-light);margin-top:0.75rem;text-align:center"></p>
                            <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border-color)">
                                <h4 style="font-size:var(--font-size-sm);margin-bottom:0.5rem;color:var(--text-secondary)">前台链接</h4>
                                <a href="forum.html" target="_blank" style="font-size:var(--font-size-sm);color:var(--primary-color);text-decoration:none;display:flex;align-items:center;gap:0.375rem"><i class="ti ti-external-link"></i>forum.html</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = 'admin-login.html';
        }
        document.getElementById('adminLogout').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'admin-login.html';
        });

        var sidebarToggle = document.getElementById('sidebarToggle');
        var sidebar = document.getElementById('sidebar');
        function checkSidebar() {
            sidebarToggle.style.display = window.innerWidth <= 1024 ? 'flex' : 'none';
        }
        checkSidebar();
        window.addEventListener('resize', checkSidebar);
        sidebarToggle.addEventListener('click', function() {
            sidebar.classList.toggle('show');
        });
        document.addEventListener('click', function(e) {
            if (window.innerWidth <= 1024 && !sidebar.contains(e.target) && !sidebarToggle.contains(e.target)) {
                sidebar.classList.remove('show');
            }
        });

        function getSlides() {
            var saved = localStorage.getItem('admin_display2_slides');
            try { return saved ? JSON.parse(saved) : []; } catch(e) { return []; }
        }

        function loadSlides() {
            var slides = getSlides();
            var container = document.getElementById('slideList');
            var linked = slides.filter(function(s) { return s.link; }).length;
            var videos = slides.filter(function(s) { return s.type === 'video'; }).length;
            var h = parseInt(localStorage.getItem('admin_display2_height')) || 500;
            var settings = {};
            try { settings = JSON.parse(localStorage.getItem('admin_settings_display2') || '{}'); } catch(e) {}

            document.getElementById('statSlides').textContent = slides.length;
            document.getElementById('statLinks').textContent = linked;
            document.getElementById('statVideos').textContent = videos;
            document.getElementById('statHeight').textContent = h;
            document.getElementById('forumHeight').value = h;
            document.getElementById('forumAutoPlay').checked = settings.autoPlay !== false;
            if (settings.interval) document.getElementById('forumInterval').value = settings.interval;

            if (!slides.length) {
                container.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-light);border:1px dashed var(--border-color);border-radius:var(--border-radius)"><i class="ti ti-photo" style="font-size:2.5rem;display:block;margin-bottom:0.75rem"></i><p>暂无内容</p><p style="font-size:var(--font-size-xs);margin-top:0.5rem">点击"添加内容"开始配置展示页</p></div>';
                updatePreview(slides);
                return;
            }

            container.innerHTML = slides.map(function(s, i) {
                var preview = '';
                if (s.media) {
                    if (s.type === 'video') {
                        preview = '<video src="' + s.media + '" muted style="width:100%;height:100%;object-fit:contain;border-radius:var(--border-radius)"></video>';
                    } else {
                        preview = '<img src="' + s.media + '" style="width:100%;height:100%;object-fit:contain;border-radius:var(--border-radius)" alt="">';
                    }
                } else {
                    preview = '<i class="ti ti-photo" style="font-size:2rem;color:var(--text-light)"></i>';
                }
                return '<div style="padding:0.75rem;border:1px solid var(--border-color);border-radius:var(--border-radius);background:var(--bg-secondary)">' +
                    '<div style="display:flex;gap:0.75rem;align-items:flex-start">' +
                    '<div style="flex-shrink:0;width:160px;height:90px;border-radius:var(--border-radius);overflow:hidden;background:var(--bg-tertiary);display:flex;align-items:center;justify-content:center">' + preview + '</div>' +
                    '<div style="flex:1;display:flex;flex-direction:column;gap:0.5rem">' +
                    '<div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">' +
                    '<select id="fsType' + i + '" style="padding:0.375rem 0.5rem;border:1px solid var(--border-color);border-radius:var(--border-radius);font-size:var(--font-size-sm);background:var(--bg-primary);color:var(--text-primary)" onchange="changeType(' + i + ', this)">' +
                    '<option value="image"' + (s.type !== 'video' ? ' selected' : '') + '>图片</option>' +
                    '<option value="video"' + (s.type === 'video' ? ' selected' : '') + '>视频</option>' +
                    '</select>' +
                    '<label class="btn-admin btn-admin-outline" style="margin:0;cursor:pointer;font-size:var(--font-size-sm);padding:0.375rem 0.75rem"><i class="ti ti-upload" style="margin-right:0.25rem"></i>选择文件<input type="file" accept="image/*,video/mp4,video/webm,video/ogg" style="display:none" onchange="uploadFile(' + i + ', this)"></label>' +
                    '</div>' +
                    '<input type="text" value="' + (s.link || '') + '" placeholder="跳转链接（留空不跳转）" id="fsLink' + i + '" oninput="onLinkInput()" style="padding:0.375rem 0.5rem;border:1px solid var(--border-color);border-radius:var(--border-radius);font-size:var(--font-size-sm);background:var(--bg-primary);color:var(--text-primary)">' +
                    '</div>' +
                    '<div style="display:flex;gap:0.375rem;flex-shrink:0">' +
                    (i > 0 ? '<button class="btn-admin btn-admin-outline" onclick="moveSlide(' + i + ',-1)" title="上移"><i class="ti ti-arrow-up"></i></button>' : '') +
                    (i < slides.length - 1 ? '<button class="btn-admin btn-admin-outline" onclick="moveSlide(' + i + ',1)" title="下移"><i class="ti ti-arrow-down"></i></button>' : '') +
                    '<button class="btn-admin btn-admin-danger" onclick="removeSlide(' + i + ')" title="删除"><i class="ti ti-trash"></i></button>' +
                    '</div>' +
                    '</div></div>';
            }).join('');
            updatePreview(slides);
        }

        function updatePreview(slides) {
            slides = slides || getSlides();
            slides = slides.filter(function(s) { return s.media; });
            var h = parseInt(document.getElementById('forumHeight').value) || 500;
            var box = document.getElementById('previewBox');
            var empty = document.getElementById('previewEmpty');
            var content = document.getElementById('previewContent');
            var track = document.getElementById('previewTrack');
            var info = document.getElementById('previewInfo');

            if (!slides.length) {
                empty.style.display = '';
                content.style.display = 'none';
                info.textContent = '';
                box.style.height = 'auto';
                return;
            }
            empty.style.display = 'none';
            content.style.display = '';
            var ph = Math.min(h * 0.45, 220);
            content.style.height = ph + 'px';
            track.innerHTML = slides.map(function(s) {
                var inner = s.type === 'video' ? '<video src="' + s.media + '" muted style="width:100%;height:100%;object-fit:contain"></video>' : '<img src="' + s.media + '" style="width:100%;height:100%;object-fit:contain">';
                return '<div style="flex-shrink:0;width:100%;height:' + ph + 'px;display:flex;align-items:center;justify-content:center">' + inner + '</div>';
            }).join('');
            info.textContent = slides.length + ' 个内容 · 高度 ' + h + 'px';
        }

        function addSlide() {
            var slides = getSlides();
            slides.push({ type: 'image', media: '', link: '' });
            try { localStorage.setItem('admin_display2_slides', JSON.stringify(slides)); } catch(e) { alert('存储空间不足'); return; }
            loadSlides();
        }

        function removeSlide(i) {
            var slides = getSlides();
            slides.splice(i, 1);
            localStorage.setItem('admin_display2_slides', JSON.stringify(slides));
            loadSlides();
        }

        function moveSlide(i, dir) {
            var slides = getSlides();
            var j = i + dir;
            if (j < 0 || j >= slides.length) return;
            var tmp = slides[i]; slides[i] = slides[j]; slides[j] = tmp;
            localStorage.setItem('admin_display2_slides', JSON.stringify(slides));
            loadSlides();
        }

        function changeType(i, sel) {
            var slides = getSlides();
            if (slides[i]) slides[i].type = sel.value;
            localStorage.setItem('admin_display2_slides', JSON.stringify(slides));
            loadSlides();
        }

        function uploadFile(i, input) {
            if (!input.files || !input.files[0]) return;
            var file = input.files[0];
            var isVideo = file.type.startsWith('video/');
            var reader = new FileReader();
            reader.onload = function(ev) {
                var data = ev.target.result;
                if (!isVideo) {
                    var img = new Image();
                    img.onload = function() {
                        var maxW = 1600, maxH = 900;
                        var w = img.width, h = img.height;
                        if (w > maxW) { h = h * maxW / w; w = maxW; }
                        if (h > maxH) { w = w * maxH / h; h = maxH; }
                        var canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        var compressed = canvas.toDataURL('image/jpeg', 0.75);
                        var slides = getSlides();
                        if (slides[i]) { slides[i].media = compressed; slides[i].type = 'image'; }
                        try { localStorage.setItem('admin_display2_slides', JSON.stringify(slides)); loadSlides(); }
                        catch(e) { alert('图片太大'); }
                    };
                    img.src = data;
                } else {
                    var slides = getSlides();
                    if (slides[i]) { slides[i].media = data; slides[i].type = 'video'; }
                    try { localStorage.setItem('admin_display2_slides', JSON.stringify(slides)); loadSlides(); }
                    catch(e) { alert('视频太大，存储空间不足'); }
                }
            };
            reader.readAsDataURL(file);
        }

        function onLinkInput() {
            var slides = getSlides();
            slides.forEach(function(s, i) {
                var el = document.getElementById('fsLink' + i);
                if (el) s.link = el.value;
            });
            localStorage.setItem('admin_display2_slides', JSON.stringify(slides));
            var linked = slides.filter(function(s) { return s.link; }).length;
            document.getElementById('statLinks').textContent = linked;
        }

        function saveAll() {
            var slides = getSlides();
            slides.forEach(function(s, i) {
                var el = document.getElementById('fsLink' + i);
                if (el) s.link = el.value;
            });
            var h = document.getElementById('forumHeight').value;
            var interval = document.getElementById('forumInterval').value;
            var autoPlay = document.getElementById('forumAutoPlay').checked;
            try {
                localStorage.setItem('admin_display2_slides', JSON.stringify(slides));
                localStorage.setItem('admin_display2_height', h);
                localStorage.setItem('admin_settings_display2', JSON.stringify({ autoPlay: autoPlay, interval: parseInt(interval) || 5000, showNav: true, showFooter: true }));
                alert('保存成功');
            } catch(e) { alert('保存失败：存储空间不足'); }
        }

        document.getElementById('forumHeight').addEventListener('input', function() {
            document.getElementById('statHeight').textContent = this.value;
            updatePreview();
        });

        loadSlides();
    </script>
</body>
</html>

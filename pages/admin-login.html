<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>var _sv="11";var _cv=localStorage.getItem("site_version");if(_cv&&_cv!==_sv){localStorage.setItem("site_version",_sv);location.replace(location.pathname+"?_t="+Date.now());}else{localStorage.setItem("site_version",_sv);}</script>
    <title>管理员登录 - 社区平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">
    <link rel="stylesheet" href="../css/style.css?v=11">
</head>
<body class="admin-login-body">
    <div class="admin-login-card">
        <div class="admin-login-logo">
            <i class="ti ti-shield-lock"></i>
        </div>
        <h1>管理后台</h1>
        <p class="subtitle">社区平台管理系统</p>
        <form id="adminLoginForm">
            <div class="form-group">
                <label for="adminUser"><i class="ti ti-user"></i> 管理员账号</label>
                <input type="text" id="adminUser" placeholder="请输入账号" required>
            </div>
            <div class="form-group">
                <label for="adminPass"><i class="ti ti-lock"></i> 密码</label>
                <input type="password" id="adminPass" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="admin-login-btn"><i class="ti ti-login"></i> 登录</button>
            <div class="admin-login-error" id="loginError"><i class="ti ti-alert-circle"></i> 账号或密码错误</div>
        </form>
        <a href="../index.html" class="admin-login-back"><i class="ti ti-arrow-left"></i> 返回前台</a>
    </div>

    <script src="../js/config.js?v=11"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var user = document.getElementById('adminUser').value;
            var pass = document.getElementById('adminPass').value;
            var savedPass = localStorage.getItem('admin_password') || 'admin123';
            if (user === 'admin' && pass === savedPass) {
                localStorage.setItem('admin_logged_in', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        });
        if (localStorage.getItem('admin_logged_in') === 'true') {
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>

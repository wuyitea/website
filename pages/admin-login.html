<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 社区平台</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-login-body">
    <div class="admin-login-card">
        <h1>管理后台</h1>
        <p class="subtitle">社区平台管理系统</p>
        <form id="adminLoginForm">
            <div class="form-group">
                <label for="adminUser">管理员账号</label>
                <input type="text" id="adminUser" placeholder="请输入账号" required>
            </div>
            <div class="form-group">
                <label for="adminPass">密码</label>
                <input type="password" id="adminPass" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="admin-login-btn">登录</button>
            <div class="admin-login-error" id="loginError">账号或密码错误</div>
        </form>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var user = document.getElementById('adminUser').value;
            var pass = document.getElementById('adminPass').value;
            if (user === 'admin' && pass === 'admin123') {
                localStorage.setItem('admin_logged_in', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        });
        if (localStorage.getItem('admin_logged_in') === 'true') {
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>

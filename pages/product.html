<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{var t=JSON.parse(localStorage.getItem('site_theme')||'{}');var r=document.documentElement;if(t.primaryColor){r.style.setProperty('--primary-color',t.primaryColor);var c=t.primaryColor;if(c[0]==='#'){var R=parseInt(c.slice(1,3),16),G=parseInt(c.slice(3,5),16),B=parseInt(c.slice(5,7),16);r.style.setProperty('--primary-dark','rgb('+(R>15?R-15:0)+','+(G>15?G-15:0)+','+(B>15?B-15:0)+')');r.style.setProperty('--primary-light','rgb('+(R<236?R+20:255)+','+(G<236?G+20:255)+','+(B<236?B+20:255)+')');}}if(t.secondaryColor)r.style.setProperty('--secondary-color',t.secondaryColor);if(t.successColor)r.style.setProperty('--success-color',t.successColor);if(t.warningColor)r.style.setProperty('--warning-color',t.warningColor);if(t.dangerColor)r.style.setProperty('--danger-color',t.dangerColor);if(t.infoColor)r.style.setProperty('--info-color',t.infoColor);if(t.borderRadius){r.style.setProperty('--border-radius',t.borderRadius);r.style.setProperty('--border-radius-lg',(parseFloat(t.borderRadius)*1.5)+'rem');}if(t.fontFamily)r.style.setProperty('--font-family',t.fontFamily);if(t.bgPrimary)r.style.setProperty('--bg-primary',t.bgPrimary);if(t.bgSecondary)r.style.setProperty('--bg-secondary',t.bgSecondary);if(t.textPrimary)r.style.setProperty('--text-primary',t.textPrimary);if(t.textSecondary)r.style.setProperty('--text-secondary',t.textSecondary);}catch(e){}</script>
    <script>var _sv="11";var _cv=localStorage.getItem("site_version");if(_cv&&_cv!==_sv){localStorage.setItem("site_version",_sv);location.replace(location.pathname+"?_t="+Date.now());}else{localStorage.setItem("site_version",_sv);}</script>
    <meta name="description" content="商品详情 - 查看商品信息、购买商品">
    <title>商品详情 - 社区平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">
    <link rel="stylesheet" href="../css/style.css?v=11">
    <link rel="stylesheet" href="../css/responsive.css?v=11">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="../index.html"><i class="ti ti-brand-community" style="margin-right:0.375rem"></i><span data-setting="siteName">社区平台</span></a>
        </div>
        <div class="nav-menu" id="navMenu">
            <ul class="nav-links">
                <li><a href="../index.html"><i class="ti ti-home"></i> <span data-copy="navHome">首页</span></a></li>
                <li><a href="forum.html"><i class="ti ti-message-circle"></i> <span data-copy="navForum">论坛</span></a></li>
                <li><a href="market.html" class="active"><i class="ti ti-shopping-bag"></i> <span data-copy="navMarket">市场</span></a></li>
            </ul>
        </div>
        <div class="nav-toggle" id="navToggle">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div style="max-width:1200px;margin:0 auto;padding:1.5rem 1rem">
        <div class="forum-layout">
            <main>
                <!-- 商品图片 -->
                <div class="admin-card" style="margin-bottom:1.5rem">
                    <div style="padding:1.5rem">
                        <img src="../images/default-product.png" alt="商品图片" id="mainImage" style="width:100%;height:400px;object-fit:contain;border-radius:var(--border-radius);background:var(--bg-tertiary)">
                    </div>
                    <div style="padding:0 1.5rem 1.5rem;display:flex;gap:0.5rem;overflow-x:auto" id="thumbnailList"></div>
                </div>

                <!-- 商品描述 -->
                <div class="admin-card">
                    <div class="admin-card-header">
                        <h2><i class="ti ti-file-text" style="margin-right:0.375rem"></i>商品描述</h2>
                    </div>
                    <div style="padding:1.5rem;color:var(--text-primary);line-height:1.8;white-space:pre-wrap" id="productDescription">加载中...</div>
                </div>
            </main>

            <aside class="forum-sidebar">
                <div class="admin-card" style="margin-bottom:1rem;position:sticky;top:80px">
                    <div style="padding:1.5rem">
                        <span class="post-category" id="productCategory" style="margin-bottom:1rem;display:inline-block"></span>
                        <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:1rem;color:var(--text-primary);line-height:1.4" id="productTitle">加载中...</h1>

                        <div style="display:flex;align-items:baseline;gap:0.75rem;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border-color)">
                            <span style="font-size:1.75rem;font-weight:700;color:var(--primary-color)" id="productPrice">¥0.00</span>
                            <span style="font-size:1rem;color:var(--text-secondary);text-decoration:line-through" id="originalPrice"></span>
                            <span class="badge badge-danger" id="discountBadge" style="display:none"></span>
                        </div>

                        <div style="margin-bottom:1.5rem">
                            <div style="display:flex;margin-bottom:0.5rem">
                                <span style="width:80px;color:var(--text-secondary)"><i class="ti ti-package"></i> 状态</span>
                                <span id="productCondition">-</span>
                            </div>
                            <div style="display:flex;margin-bottom:0.5rem">
                                <span style="width:80px;color:var(--text-secondary)"><i class="ti ti-eye"></i> 浏览</span>
                                <span id="viewsCount">0</span>
                            </div>
                            <div style="display:flex;margin-bottom:0.5rem">
                                <span style="width:80px;color:var(--text-secondary)"><i class="ti ti-clock"></i> 发布</span>
                                <span id="publishTime">-</span>
                            </div>
                        </div>

                        <div style="display:flex;align-items:center;gap:0.75rem;padding:1rem;background:var(--bg-secondary);border-radius:var(--border-radius);margin-bottom:1.5rem">
                            <img src="../images/default-avatar.png" alt="头像" id="sellerAvatar" style="width:48px;height:48px;border-radius:50%">
                            <div style="flex:1">
                                <div style="font-weight:600;color:var(--text-primary)" id="sellerName">加载中...</div>
                                <div style="font-size:0.875rem;color:var(--text-secondary)" id="sellerStats">-</div>
                            </div>
                            <span id="sellerLink" style="font-size:var(--font-size-sm);color:var(--text-secondary)"><i class="ti ti-user"></i> 卖家</span>
                        </div>

                        <div style="display:flex;gap:0.75rem">
                            <button class="btn btn-outline" id="addToCartBtn" style="flex:1">
                                <i class="ti ti-shopping-cart"></i> 加入购物车
                            </button>
                            <button class="btn btn-primary" id="buyNowBtn" style="flex:1">
                                <i class="ti ti-shopping-bag"></i> 立即购买
                            </button>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 <span data-setting="siteName">社区平台</span>. 保留所有权利. <span data-setting="siteICP" style="display:none"></span></p>
            </div>
        </div>
    </footer>

    <script src="../js/config.js?v=11"></script>

    <script src="../js/product.js?v=11"></script>
</body>
</html>

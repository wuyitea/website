<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{var t=JSON.parse(localStorage.getItem('site_theme')||'{}');var r=document.documentElement;if(t.primaryColor){r.style.setProperty('--primary-color',t.primaryColor);var c=t.primaryColor;if(c[0]==='#'){var R=parseInt(c.slice(1,3),16),G=parseInt(c.slice(3,5),16),B=parseInt(c.slice(5,7),16);r.style.setProperty('--primary-dark','rgb('+(R>15?R-15:0)+','+(G>15?G-15:0)+','+(B>15?B-15:0)+')');r.style.setProperty('--primary-light','rgb('+(R<236?R+20:255)+','+(G<236?G+20:255)+','+(B<236?B+20:255)+')');}}if(t.secondaryColor)r.style.setProperty('--secondary-color',t.secondaryColor);if(t.successColor)r.style.setProperty('--success-color',t.successColor);if(t.warningColor)r.style.setProperty('--warning-color',t.warningColor);if(t.dangerColor)r.style.setProperty('--danger-color',t.dangerColor);if(t.infoColor)r.style.setProperty('--info-color',t.infoColor);if(t.borderRadius){r.style.setProperty('--border-radius',t.borderRadius);r.style.setProperty('--border-radius-lg',(parseFloat(t.borderRadius)*1.5)+'rem');}if(t.fontFamily)r.style.setProperty('--font-family',t.fontFamily);if(t.bgPrimary)r.style.setProperty('--bg-primary',t.bgPrimary);if(t.bgSecondary)r.style.setProperty('--bg-secondary',t.bgSecondary);if(t.textPrimary)r.style.setProperty('--text-primary',t.textPrimary);if(t.textSecondary)r.style.setProperty('--text-secondary',t.textSecondary);}catch(e){}</script>
    <script>var _sv="11";var _cv=localStorage.getItem("site_version");if(_cv&&_cv!==_sv){localStorage.setItem("site_version",_sv);location.replace(location.pathname+"?_t="+Date.now());}else{localStorage.setItem("site_version",_sv);}</script>
    <meta name="description" content="帖子详情 - 查看帖子内容、评论、参与讨论">
    <title>帖子详情 - 社区平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">
    <link rel="stylesheet" href="../css/style.css?v=11">
    <link rel="stylesheet" href="../css/responsive.css?v=11">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="../index.html"><i class="ti ti-brand-community" style="margin-right:0.375rem"></i><span data-setting="siteName">社区平台</span></a>
        </div>
        <div class="nav-menu" id="navMenu">
            <ul class="nav-links">
                <li><a href="../index.html"><i class="ti ti-home"></i> <span data-copy="navHome">首页</span></a></li>
                <li><a href="forum.html"><i class="ti ti-message-circle"></i> <span data-copy="navForum">论坛</span></a></li>
                <li><a href="market.html"><i class="ti ti-shopping-bag"></i> <span data-copy="navMarket">市场</span></a></li>
                <li><a href="display1.html"><i class="ti ti-slideshow"></i> <span data-copy="navDisplay1">展示页1</span></a></li>
                <li><a href="display2.html"><i class="ti ti-device-desktop"></i> <span data-copy="navDisplay2">展示页2</span></a></li>
            </ul>
        </div>
        <div class="nav-toggle" id="navToggle">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div style="max-width:1200px;margin:0 auto;padding:1.5rem 1rem">
        <div class="forum-layout">
            <main>
                <!-- 帖子详情 -->
                <div class="admin-card">
                    <div class="post-header" style="padding:1.25rem 1.5rem;border-bottom:1px solid var(--border-color)">
                        <img src="../images/default-avatar.png" alt="头像" class="post-avatar" id="postAvatar">
                        <div class="post-meta">
                            <div class="post-author" id="postAuthor">加载中...</div>
                            <div class="post-time" id="postTime"></div>
                        </div>
                        <span class="post-category" id="postCategory"></span>
                    </div>

                    <div style="padding:1.5rem">
                        <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:1rem;color:var(--text-primary);line-height:1.4" id="postTitle">加载中...</h1>

                        <div style="color:var(--text-primary);line-height:1.8;margin-bottom:1.5rem;white-space:pre-wrap" id="postContent">加载中...</div>

                        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.5rem" id="postTags"></div>

                        <div class="post-actions">
                            <button class="post-action" id="likeBtn">
                                <i class="ti ti-thumb-up"></i>
                                <span id="likesCount">0</span>
                            </button>
                            <button class="post-action" id="bookmarkBtn">
                                <i class="ti ti-bookmark"></i>
                                <span>收藏</span>
                            </button>
                            <button class="post-action" id="shareBtn">
                                <i class="ti ti-share"></i>
                                <span>分享</span>
                            </button>
                        </div>
                    </div>

                    <!-- 评论区 -->
                    <div style="border-top:1px solid var(--border-color);padding:1.5rem">
                        <h2 style="font-size:1.125rem;font-weight:600;margin-bottom:1rem;color:var(--text-primary)">
                            <i class="ti ti-message" style="margin-right:0.375rem"></i>评论 <span id="commentsCount">(0)</span>
                        </h2>

                        <div class="comment-form">
                            <textarea id="commentContent" placeholder="写下你的评论..." rows="3" style="width:100%;padding:0.75rem;border:1px solid var(--border-color);border-radius:var(--border-radius);resize:vertical;min-height:80px;font-family:inherit;font-size:var(--font-size-base);background:var(--bg-primary);color:var(--text-primary)"></textarea>
                            <div class="comment-form-actions">
                                <button class="btn btn-primary" id="submitCommentBtn">
                                    <i class="ti ti-send"></i> 发表评论
                                </button>
                            </div>
                        </div>

                        <div class="comments-list" id="commentsList"></div>
                    </div>
                </div>
            </main>

            <aside class="forum-sidebar">
                <div class="admin-card" style="margin-bottom:1rem">
                    <div class="admin-card-header">
                        <h2><i class="ti ti-user" style="margin-right:0.375rem"></i>作者信息</h2>
                    </div>
                    <div style="padding:1rem">
                        <div id="authorLink" style="display:flex;align-items:center;gap:0.75rem;padding:0.75rem;border-radius:var(--border-radius)">
                            <img src="../images/default-avatar.png" alt="头像" id="authorAvatar" style="width:48px;height:48px;border-radius:50%">
                            <div>
                                <div style="font-weight:600;color:var(--text-primary)" id="authorName">加载中...</div>
                                <div style="font-size:0.875rem;color:var(--text-secondary);margin-top:0.25rem" id="authorBio">这个人很懒，什么都没写</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="admin-card">
                    <div class="admin-card-header">
                        <h2><i class="ti ti-link" style="margin-right:0.375rem"></i>相关帖子</h2>
                    </div>
                    <div style="padding:1rem">
                        <div class="related-posts" id="relatedPosts"></div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 <span data-setting="siteName">社区平台</span>. 保留所有权利. <span data-setting="siteICP" style="display:none"></span></p>
            </div>
        </div>
    </footer>

    <script src="../js/config.js?v=11"></script>

    <script src="../js/post.js?v=11"></script>
</body>
</html>

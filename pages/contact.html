<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{var t=JSON.parse(localStorage.getItem('site_theme')||'{}');var r=document.documentElement;if(t.primaryColor){r.style.setProperty('--primary-color',t.primaryColor);var c=t.primaryColor;if(c[0]==='#'){var R=parseInt(c.slice(1,3),16),G=parseInt(c.slice(3,5),16),B=parseInt(c.slice(5,7),16);r.style.setProperty('--primary-dark','rgb('+(R>15?R-15:0)+','+(G>15?G-15:0)+','+(B>15?B-15:0)+')');r.style.setProperty('--primary-light','rgb('+(R<236?R+20:255)+','+(G<236?G+20:255)+','+(B<236?B+20:255)+')');}}if(t.secondaryColor)r.style.setProperty('--secondary-color',t.secondaryColor);if(t.successColor)r.style.setProperty('--success-color',t.successColor);if(t.warningColor)r.style.setProperty('--warning-color',t.warningColor);if(t.dangerColor)r.style.setProperty('--danger-color',t.dangerColor);if(t.infoColor)r.style.setProperty('--info-color',t.infoColor);if(t.borderRadius){r.style.setProperty('--border-radius',t.borderRadius);r.style.setProperty('--border-radius-lg',(parseFloat(t.borderRadius)*1.5)+'rem');}if(t.fontFamily)r.style.setProperty('--font-family',t.fontFamily);if(t.bgPrimary)r.style.setProperty('--bg-primary',t.bgPrimary);if(t.bgSecondary)r.style.setProperty('--bg-secondary',t.bgSecondary);if(t.textPrimary)r.style.setProperty('--text-primary',t.textPrimary);if(t.textSecondary)r.style.setProperty('--text-secondary',t.textSecondary);}catch(e){}</script>
    <script>var _sv="14";var _cv=localStorage.getItem("site_version");if(_cv&&_cv!==_sv){localStorage.setItem("site_version",_sv);location.replace(location.pathname+"?_t="+Date.now());}else{localStorage.setItem("site_version",_sv);}</script>
    <meta name="description" content="联系我们 - 如有任何问题或建议，请随时联系我们">
    <title>联系我们 - 社区平台</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">
    <link rel="stylesheet" href="../css/style.css?v=14">
    <link rel="stylesheet" href="../css/responsive.css?v=14">
    <style>
        .contact-hero {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            padding: var(--spacing-2xl) var(--spacing-md);
            text-align: center;
        }
        
        .contact-hero h1 {
            font-size: var(--font-size-3xl);
            margin-bottom: var(--spacing-md);
        }
        
        .contact-hero p {
            font-size: var(--font-size-lg);
            opacity: 0.9;
        }
        
        .contact-content {
            padding: var(--spacing-2xl) 0;
        }
        
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-xl);
            margin-bottom: var(--spacing-2xl);
        }
        
        .contact-card {
            text-align: center;
            padding: var(--spacing-xl);
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
        }
        
        .contact-icon {
            font-size: 48px;
            margin-bottom: var(--spacing-md);
        }
        
        .contact-title {
            font-size: var(--font-size-xl);
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
            color: var(--text-primary);
        }
        
        .contact-info {
            color: var(--text-secondary);
            line-height: 1.8;
        }
        
        .contact-form-section {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .contact-form-section h2 {
            font-size: var(--font-size-2xl);
            margin-bottom: var(--spacing-lg);
            text-align: center;
            color: var(--text-primary);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="../index.html"><i class="ti ti-brand-community" style="margin-right:0.375rem"></i><span data-setting="siteName">社区平台</span></a>
        </div>
        <div class="nav-menu">
            <ul class="nav-links">
                <li data-nav="home"><a href="../index.html"><i class="ti ti-home"></i> <span data-copy="navHome">首页</span></a></li>
                <li data-nav="forum"><a href="forum.html"><i class="ti ti-messages"></i> <span data-copy="navForum">论坛</span></a></li>
                <li data-nav="market"><a href="market.html"><i class="ti ti-shopping-bag"></i> <span data-copy="navMarket">市场</span></a></li>
                <li data-nav="about"><a href="about.html"><i class="ti ti-info-circle"></i> <span data-copy="navAbout">关于我们</span></a></li>
            </ul>
        </div>
        <div class="nav-toggle" id="navToggle">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <main class="main">
        <section class="contact-hero">
            <h1><i class="ti ti-mail"></i> 联系我们</h1>
            <p>如有任何问题、建议或合作意向，欢迎随时联系我们</p>
        </section>
        
        <div class="container">
            <div class="contact-content">
                <div class="contact-grid">
                    <div class="contact-card">
                        <div class="contact-icon"><i class="ti ti-mail" style="color:var(--primary-color)"></i></div>
                        <h3 class="contact-title">电子邮件</h3>
                        <p class="contact-info">support@community.com<br>business@community.com</p>
                    </div>
                    <div class="contact-card">
                        <div class="contact-icon"><i class="ti ti-phone" style="color:var(--primary-color)"></i></div>
                        <h3 class="contact-title">电话</h3>
                        <p class="contact-info">客服热线：400-123-4567<br>工作时间：周一至周五 9:00-18:00</p>
                    </div>
                    <div class="contact-card">
                        <div class="contact-icon"><i class="ti ti-map-pin" style="color:var(--primary-color)"></i></div>
                        <h3 class="contact-title">地址</h3>
                        <p class="contact-info">北京市朝阳区科技园区<br>创新大厦 888 号</p>
                    </div>
                </div>
                
                <div class="contact-form-section">
                    <h2><i class="ti ti-send"></i> 发送消息</h2>
                    <form id="contactForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="name"><i class="ti ti-user"></i> 您的姓名</label>
                                <input type="text" id="name" required>
                            </div>
                            <div class="form-group">
                                <label for="email"><i class="ti ti-at"></i> 邮箱地址</label>
                                <input type="email" id="email" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="subject"><i class="ti ti-tag"></i> 主题</label>
                            <input type="text" id="subject" required>
                        </div>
                        <div class="form-group">
                            <label for="message"><i class="ti ti-message"></i> 留言内容</label>
                            <textarea id="message" rows="6" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block"><i class="ti ti-send"></i> 发送消息</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="about.html"><i class="ti ti-info-circle"></i> <span data-copy="footerLinkAbout">关于我们</span></a>
                <a href="contact.html" class="active"><i class="ti ti-mail"></i> <span data-copy="footerLinkContact">联系我们</span></a>
                <a href="terms.html"><i class="ti ti-file-text"></i> <span data-copy="footerLinkTerms">服务条款</span></a>
                <a href="privacy.html"><i class="ti ti-lock"></i> <span data-copy="footerLinkPrivacy">隐私政策</span></a>
                <a href="cookies.html"><i class="ti ti-cookie"></i> <span data-copy="footerLinkCookies">Cookie政策</span></a>
            </div>
            <div class="footer-bottom">
                <p><i class="ti ti-copyright"></i> 2026 <span data-setting="siteName">社区平台</span>. 保留所有权利. <span data-setting="siteICP" style="display:none"></span></p>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('感谢您的留言，我们会尽快回复！');
            this.reset();
        });
    </script>
    <script src="../js/config.js?v=14"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="联系我们 - 如有任何问题或建议，请随时联系我们">
    <title>联系我们 - 社区平台</title>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <style>
        .contact-hero {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            padding: var(--spacing-2xl) var(--spacing-md);
            text-align: center;
        }
        
        .contact-hero h1 {
            font-size: var(--font-size-3xl);
            margin-bottom: var(--spacing-md);
        }
        
        .contact-hero p {
            font-size: var(--font-size-lg);
            opacity: 0.9;
        }
        
        .contact-content {
            padding: var(--spacing-2xl) 0;
        }
        
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-xl);
            margin-bottom: var(--spacing-2xl);
        }
        
        .contact-card {
            text-align: center;
            padding: var(--spacing-xl);
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
        }
        
        .contact-icon {
            font-size: 48px;
            margin-bottom: var(--spacing-md);
        }
        
        .contact-title {
            font-size: var(--font-size-xl);
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
            color: var(--text-primary);
        }
        
        .contact-info {
            color: var(--text-secondary);
            line-height: 1.8;
        }
        
        .contact-form-section {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .contact-form-section h2 {
            font-size: var(--font-size-2xl);
            margin-bottom: var(--spacing-lg);
            text-align: center;
            color: var(--text-primary);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="nav-brand">
                <a href="../index.html">社区平台</a>
            </div>
            <div class="nav-menu">
                <ul class="nav-links">
                    <li><a href="../index.html">首页</a></li>
                    <li><a href="forum.html">论坛</a></li>
                    <li><a href="market.html">市场</a></li>
                    <li><a href="about.html">关于我们</a></li>
                </ul>
            </div>
            <div class="nav-toggle" id="navToggle">
                <span></span><span></span><span></span>
            </div>
        </nav>
    </header>

    <main class="main">
        <section class="contact-hero">
            <h1>联系我们</h1>
            <p>如有任何问题、建议或合作意向，欢迎随时联系我们</p>
        </section>
        
        <div class="container">
            <div class="contact-content">
                <div class="contact-grid">
                    <div class="contact-card">
                        <div class="contact-icon">📧</div>
                        <h3 class="contact-title">电子邮件</h3>
                        <p class="contact-info">support@community.com<br>business@community.com</p>
                    </div>
                    <div class="contact-card">
                        <div class="contact-icon">📞</div>
                        <h3 class="contact-title">电话</h3>
                        <p class="contact-info">客服热线：400-123-4567<br>工作时间：周一至周五 9:00-18:00</p>
                    </div>
                    <div class="contact-card">
                        <div class="contact-icon">📍</div>
                        <h3 class="contact-title">地址</h3>
                        <p class="contact-info">北京市朝阳区科技园区<br>创新大厦 888 号</p>
                    </div>
                </div>
                
                <div class="contact-form-section">
                    <h2>发送消息</h2>
                    <form id="contactForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="name">您的姓名</label>
                                <input type="text" id="name" required>
                            </div>
                            <div class="form-group">
                                <label for="email">邮箱地址</label>
                                <input type="email" id="email" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="subject">主题</label>
                            <input type="text" id="subject" required>
                        </div>
                        <div class="form-group">
                            <label for="message">留言内容</label>
                            <textarea id="message" rows="6" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">发送消息</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="about.html">关于我们</a>
                <a href="contact.html" class="active">联系我们</a>
                <a href="terms.html">服务条款</a>
                <a href="privacy.html">隐私政策</a>
                <a href="cookies.html">Cookie政策</a>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 社区平台. 保留所有权利.</p>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('感谢您的留言，我们会尽快回复！');
            this.reset();
        });
    </script>
</body>
</html>

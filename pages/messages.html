<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="消息中心 - 查看私信、系统通知、互动消息">
    <title>消息 - 社区平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="../index.html"><i class="ti ti-brand-community" style="margin-right:0.375rem"></i>社区平台</a>
        </div>
        <div class="nav-search" id="navSearch">
            <div class="input-icon">
                <i class="ti ti-search"></i>
                <input type="search" placeholder="搜索..." id="searchInput">
            </div>
        </div>
        <div class="nav-menu" id="navMenu">
            <ul class="nav-links">
                <li><a href="../index.html"><i class="ti ti-home"></i> 首页</a></li>
                <li><a href="forum.html"><i class="ti ti-message-circle"></i> 论坛</a></li>
                <li><a href="market.html"><i class="ti ti-shopping-bag"></i> 市场</a></li>
                <li><a href="messages.html" class="active"><i class="ti ti-mail"></i> 消息</a></li>
            </ul>
        </div>
        <div class="nav-user">
            <div class="user-actions" id="userActions">
                <button class="btn btn-ghost" id="loginBtn">登录</button>
                <button class="btn btn-primary" id="registerBtn">注册</button>
            </div>
            <div class="user-profile" id="userProfile" style="display:none;">
                <img src="../images/default-avatar.png" alt="头像" id="userAvatar">
                <div class="user-dropdown">
                    <a href="profile.html"><i class="ti ti-user"></i> 个人资料</a>
                    <a href="settings.html"><i class="ti ti-settings"></i> 设置</a>
                    <a href="#" id="logoutBtn"><i class="ti ti-logout"></i> 退出登录</a>
                </div>
            </div>
        </div>
        <div class="nav-toggle" id="navToggle">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div style="max-width:1200px;margin:0 auto;padding:1.5rem 1rem">
        <div class="forum-layout">
            <!-- 消息列表 -->
            <main>
                <div class="admin-card" style="margin-bottom:1rem">
                    <div class="admin-card-header">
                        <h2><i class="ti ti-mail" style="margin-right:0.375rem"></i>消息</h2>
                    </div>

                    <div style="display:flex;border-bottom:1px solid var(--border-color)">
                        <button class="messages-tab active" data-tab="private" style="flex:1;padding:0.75rem;border:none;background:none;color:var(--text-secondary);cursor:pointer;font-weight:500;border-bottom:2px solid transparent">
                            <i class="ti ti-message"></i> 私信
                        </button>
                        <button class="messages-tab" data-tab="system" style="flex:1;padding:0.75rem;border:none;background:none;color:var(--text-secondary);cursor:pointer;font-weight:500;border-bottom:2px solid transparent">
                            <i class="ti ti-bell"></i> 系统
                        </button>
                        <button class="messages-tab" data-tab="interaction" style="flex:1;padding:0.75rem;border:none;background:none;color:var(--text-secondary);cursor:pointer;font-weight:500;border-bottom:2px solid transparent">
                            <i class="ti ti-heart"></i> 互动
                        </button>
                    </div>

                    <div id="messagesList" style="min-height:400px"></div>
                </div>
            </main>

            <!-- 聊天区域 -->
            <aside class="forum-sidebar">
                <div class="admin-card" style="position:sticky;top:80px">
                    <div id="chatArea" style="min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-secondary);padding:2rem">
                        <i class="ti ti-message" style="font-size:3rem;margin-bottom:1rem;opacity:0.5"></i>
                        <h3 style="margin-bottom:0.5rem">选择一个对话</h3>
                        <p style="font-size:0.875rem">从左侧选择一个对话开始聊天</p>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 社区平台. 保留所有权利.</p>
            </div>
        </div>
    </footer>

    <!-- 登录模态框 -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2><i class="ti ti-login" style="margin-right:0.375rem"></i>登录</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail"><i class="ti ti-mail"></i> 邮箱</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword"><i class="ti ti-lock"></i> 密码</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="ti ti-login"></i> 登录
                </button>
            </form>
            <div class="modal-footer">
                <p>还没有账号？<a href="#" id="showRegister">立即注册</a></p>
            </div>
        </div>
    </div>

    <!-- 注册模态框 -->
    <div class="modal" id="registerModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2><i class="ti ti-user-plus" style="margin-right:0.375rem"></i>注册</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="registerUsername"><i class="ti ti-user"></i> 用户名</label>
                    <input type="text" id="registerUsername" required>
                </div>
                <div class="form-group">
                    <label for="registerEmail"><i class="ti ti-mail"></i> 邮箱</label>
                    <input type="email" id="registerEmail" required>
                </div>
                <div class="form-group">
                    <label for="registerPassword"><i class="ti ti-lock"></i> 密码</label>
                    <input type="password" id="registerPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="registerConfirmPassword"><i class="ti ti-lock-check"></i> 确认密码</label>
                    <input type="password" id="registerConfirmPassword" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="ti ti-user-plus"></i> 注册
                </button>
            </form>
            <div class="modal-footer">
                <p>已有账号？<a href="#" id="showLogin">立即登录</a></p>
            </div>
        </div>
    </div>

    <script src="../js/config.js?v=5"></script>
    <script>var _sv="5";var _cv=localStorage.getItem("site_version");if(_cv&&_cv!==_sv){localStorage.setItem("site_version",_sv);location.href=location.href.split("?")[0]+"?_t="+Date.now();}else{localStorage.setItem("site_version",_sv);}</script>
    <script src="../js/auth.js?v=5"></script>
    <script src="../js/messages.js?v=5"></script>
</body>
</html>

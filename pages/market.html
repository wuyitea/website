<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{var t=JSON.parse(localStorage.getItem('site_theme')||'{}');var r=document.documentElement;if(t.primaryColor){r.style.setProperty('--primary-color',t.primaryColor);var c=t.primaryColor;if(c[0]==='#'){var R=parseInt(c.slice(1,3),16),G=parseInt(c.slice(3,5),16),B=parseInt(c.slice(5,7),16);r.style.setProperty('--primary-dark','rgb('+(R>15?R-15:0)+','+(G>15?G-15:0)+','+(B>15?B-15:0)+')');r.style.setProperty('--primary-light','rgb('+(R<236?R+20:255)+','+(G<236?G+20:255)+','+(B<236?B+20:255)+')');}}if(t.secondaryColor)r.style.setProperty('--secondary-color',t.secondaryColor);if(t.successColor)r.style.setProperty('--success-color',t.successColor);if(t.warningColor)r.style.setProperty('--warning-color',t.warningColor);if(t.dangerColor)r.style.setProperty('--danger-color',t.dangerColor);if(t.infoColor)r.style.setProperty('--info-color',t.infoColor);if(t.borderRadius){r.style.setProperty('--border-radius',t.borderRadius);r.style.setProperty('--border-radius-lg',(parseFloat(t.borderRadius)*1.5)+'rem');}if(t.fontFamily)r.style.setProperty('--font-family',t.fontFamily);if(t.bgPrimary)r.style.setProperty('--bg-primary',t.bgPrimary);if(t.bgSecondary)r.style.setProperty('--bg-secondary',t.bgSecondary);if(t.textPrimary)r.style.setProperty('--text-primary',t.textPrimary);if(t.textSecondary)r.style.setProperty('--text-secondary',t.textSecondary);}catch(e){}</script>
    <script>var _sv="11";var _cv=localStorage.getItem("site_version");if(_cv&&_cv!==_sv){localStorage.setItem("site_version",_sv);location.replace(location.pathname+"?_t="+Date.now());}else{localStorage.setItem("site_version",_sv);}</script>
    <meta name="description" content="商城 - 轮播横幅与店铺入口">
    <title>商城 - 社区平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">
    <link rel="stylesheet" href="../css/style.css?v=11">
    <link rel="stylesheet" href="../css/responsive.css?v=11">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="../index.html"><i class="ti ti-brand-community" style="margin-right:0.375rem"></i><span data-setting="siteName">社区平台</span></a>
        </div>

        <div class="nav-menu" id="navMenu">
            <ul class="nav-links">
                <li><a href="../index.html"><i class="ti ti-home"></i> <span data-copy="navHome">首页</span></a></li>
                <li><a href="forum.html"><i class="ti ti-message-circle"></i> <span data-copy="navForum">论坛</span></a></li>
                <li><a href="market.html" ><i class="ti ti-shopping-bag"></i> <span data-copy="navMarket">商城</span></a></li>
                <li><a href="display1.html"><i class="ti ti-slideshow"></i> <span data-copy="navDisplay1">展示页1</span></a></li>
                <li><a href="display2.html"><i class="ti ti-device-desktop"></i> <span data-copy="navDisplay2">展示页2</span></a></li>
            </ul>
        </div>
        <div class="nav-toggle" id="navToggle">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div style="max-width:1200px;margin:0 auto;padding:1.5rem 1rem">
        <!-- 轮播横幅 -->
        <div class="market-banner" id="marketBanner" style="position:relative;border-radius:var(--border-radius-xl);overflow:hidden;margin-bottom:1.5rem;height:280px;background:linear-gradient(135deg,var(--primary-color),var(--primary-light));display:none">
            <div class="banner-slides" id="bannerSlides" style="display:flex;width:100%;height:100%;transition:transform 0.5s ease"></div>
            <button class="banner-arrow banner-prev" onclick="prevBanner()" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,0.9);color:var(--text-primary);font-size:1.25rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);z-index:2"><i class="ti ti-chevron-left"></i></button>
            <button class="banner-arrow banner-next" onclick="nextBanner()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,0.9);color:var(--text-primary);font-size:1.25rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);z-index:2"><i class="ti ti-chevron-right"></i></button>
            <div class="banner-dots" id="bannerDots" style="position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:2"></div>
        </div>

        <!-- 店铺入口 -->
        <div id="shopLinks" style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem"></div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 <span data-setting="siteName">社区平台</span>. 保留所有权利. <span data-setting="siteICP" style="display:none"></span></p>
            </div>
        </div>
    </footer>



    <script>
    var bannerTimer = null;
    var bannerIndex = 0;

    function loadMarketBanners() {
        var saved = localStorage.getItem('admin_market_banners');
        var banners = [];
        try { banners = saved ? JSON.parse(saved) : []; } catch (e) { banners = []; }
        var container = document.getElementById('marketBanner');
        var slidesEl = document.getElementById('bannerSlides');
        var dotsEl = document.getElementById('bannerDots');
        if (!banners.length || !banners.some(function(b) { return b.image; })) { container.style.display = 'none'; return; }
        banners = banners.filter(function(b) { return b.image; });
        container.style.display = 'block';
        slidesEl.innerHTML = banners.map(function(b) {
            return '<div style="min-width:100%;height:100%"><a href="' + (b.link || '#') + '" target="' + (b.link ? '_blank' : '_self') + '" style="display:block;width:100%;height:100%"><img src="' + b.image + '" alt="" style="width:100%;height:100%;object-fit:cover"></a></div>';
        }).join('');
        dotsEl.innerHTML = banners.map(function(_, i) {
            return '<div onclick="goBanner(' + i + ')" style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.5);cursor:pointer;transition:background 0.3s' + (i === 0 ? ';background:white' : '') + '"></div>';
        }).join('');
        if (banners.length > 1) { clearInterval(bannerTimer); bannerTimer = setInterval(nextBanner, 4000); }
    }

    function updateBanner() {
        var slidesEl = document.getElementById('bannerSlides');
        var dotsEl = document.getElementById('bannerDots');
        var total = slidesEl.children.length;
        if (!total) return;
        slidesEl.style.transform = 'translateX(-' + (bannerIndex * 100) + '%)';
        Array.from(dotsEl.children).forEach(function(d, i) { d.style.background = i === bannerIndex ? 'white' : 'rgba(255,255,255,0.5)'; });
    }

    function nextBanner() { var t = document.getElementById('bannerSlides').children.length; if (!t) return; bannerIndex = (bannerIndex + 1) % t; updateBanner(); }
    function prevBanner() { var t = document.getElementById('bannerSlides').children.length; if (!t) return; bannerIndex = (bannerIndex - 1 + t) % t; updateBanner(); }
    function goBanner(i) { bannerIndex = i; updateBanner(); }

    function loadShopLinks() {
        var saved = localStorage.getItem('admin_shop_links');
        var links = saved ? JSON.parse(saved) : [
            { name: '淘宝小店', icon: 'ti ti-shopping-cart', color: '#ff5000', bgColor: 'rgba(255,80,0,0.08)', url: '#', desc: '逛逛淘宝好物' },
            { name: '微信小店', icon: 'ti ti-brand-wechat', color: '#07c160', bgColor: 'rgba(7,193,96,0.08)', url: '#', desc: '微信小程序商城' }
        ];
        var container = document.getElementById('shopLinks');
        container.innerHTML = links.map(function(link) {
            return '<a href="' + (link.url || '#') + '" target="_blank" style="display:flex;align-items:center;gap:1rem;padding:1.25rem 1.5rem;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--border-radius-xl);text-decoration:none;transition:all 0.2s;box-shadow:var(--shadow-sm)"><div style="width:56px;height:56px;border-radius:var(--border-radius-lg);background:' + (link.bgColor || 'var(--bg-secondary)') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="' + (link.icon || 'ti ti-link') + '" style="font-size:1.75rem;color:' + (link.color || 'var(--primary-color)') + '"></i></div><div><div style="font-size:1.125rem;font-weight:600;color:var(--text-primary);margin-bottom:0.125rem">' + (link.name || '链接') + '</div><div style="font-size:var(--font-size-sm);color:var(--text-secondary)">' + (link.desc || '') + '</div></div><i class="ti ti-chevron-right" style="margin-left:auto;color:var(--text-light)"></i></a>';
        }).join('');
    }

    loadMarketBanners();
    loadShopLinks();
    </script>
    <script src="../js/config.js?v=11"></script>
</body>
</html>

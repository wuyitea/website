<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="社区市场 - 发现优质商品，买卖二手物品">
    <meta name="keywords" content="市场, 电商, 购物, 二手, 商品">
    <title>市场 - 社区平台</title>
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourdomain.com/pages/market.html">
    <meta property="og:title" content="市场 - 社区平台">
    <meta property="og:description" content="发现优质商品，买卖二手物品">
    <meta property="og:image" content="https://yourdomain.com/images/og-image.jpg">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://yourdomain.com/pages/market.html">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <style>
        .market-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: var(--spacing-xl);
            padding: var(--spacing-xl) 0;
        }
        
        .market-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-xl);
        }
        
        .market-filters {
            display: flex;
            gap: var(--spacing-md);
            flex-wrap: wrap;
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .filter-label {
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .filter-select {
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
        }
        
        .products-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: var(--spacing-lg);
        }
        
        .product-item {
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            transition: var(--transition);
        }
        
        .product-item:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        
        .product-item-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: var(--bg-tertiary);
        }
        
        .product-item-info {
            padding: var(--spacing-md);
        }
        
        .product-item-title {
            font-size: var(--font-size-lg);
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
            color: var(--text-primary);
        }
        
        .product-item-title a {
            color: var(--text-primary);
        }
        
        .product-item-title a:hover {
            color: var(--primary-color);
        }
        
        .product-item-price {
            font-size: var(--font-size-xl);
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: var(--spacing-sm);
        }
        
        .product-item-original-price {
            font-size: var(--font-size-sm);
            color: var(--text-light);
            text-decoration: line-through;
            margin-left: var(--spacing-sm);
        }
        
        .product-item-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-secondary);
            font-size: var(--font-size-sm);
            margin-bottom: var(--spacing-md);
        }
        
        .product-item-seller {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .product-item-seller img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }
        
        .product-item-stats {
            display: flex;
            gap: var(--spacing-md);
        }
        
        .product-item-actions {
            display: flex;
            gap: var(--spacing-sm);
        }
        
        .product-item-actions .btn {
            flex: 1;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-xl);
        }
        
        .page-btn {
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--border-color);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
        }
        
        .page-btn:hover,
        .page-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        @media (max-width: 1024px) {
            .market-layout {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: var(--spacing-md);
            }
        }
        
        @media (max-width: 768px) {
            .market-header {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--spacing-md);
            }
            
            .market-filters {
                width: 100%;
                overflow-x: auto;
            }
            
            .products-list {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }
        
        @media (max-width: 480px) {
            .products-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header class="header">
        <nav class="navbar">
            <div class="nav-brand">
                <a href="../index.html">社区平台</a>
            </div>
            
            <div class="nav-search">
                <input type="search" placeholder="搜索商品..." id="searchInput">
                <button type="button" id="searchBtn">搜索</button>
            </div>
            
            <div class="nav-menu">
                <ul class="nav-links">
                    <li><a href="../index.html">首页</a></li>
                    <li><a href="forum.html">论坛</a></li>
                    <li><a href="market.html" class="active">市场</a></li>
                    <li><a href="messages.html">消息</a></li>
                </ul>
            </div>
            
            <div class="nav-user">
                <div class="user-actions" id="userActions">
                    <button class="btn btn-outline" id="loginBtn">登录</button>
                    <button class="btn btn-primary" id="registerBtn">注册</button>
                </div>
                <div class="user-profile" id="userProfile" style="display: none;">
                    <img src="../images/default-avatar.png" alt="用户头像" id="userAvatar">
                    <div class="user-dropdown">
                        <a href="profile.html">个人资料</a>
                        <a href="settings.html">设置</a>
                        <a href="#" id="logoutBtn">退出登录</a>
                    </div>
                </div>
            </div>
            
            <div class="nav-toggle" id="navToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <!-- 主要内容 -->
    <main class="main">
        <div class="container">
            <div class="market-layout">
                <!-- 侧边栏 -->
                <aside class="sidebar">
                    <div class="sidebar-section">
                        <h3 class="sidebar-title">商品分类</h3>
                        <ul class="category-list" id="categoryList">
                            <!-- 动态加载 -->
                        </ul>
                    </div>
                    
                    <div class="sidebar-section">
                        <h3 class="sidebar-title">价格区间</h3>
                        <div class="price-filter">
                            <input type="number" placeholder="最低价" id="minPrice">
                            <span>-</span>
                            <input type="number" placeholder="最高价" id="maxPrice">
                            <button class="btn btn-sm btn-primary" id="filterPriceBtn">筛选</button>
                        </div>
                    </div>
                    
                    <div class="sidebar-section">
                        <h3 class="sidebar-title">商品状态</h3>
                        <ul class="category-list">
                            <li class="category-item">
                                <a href="#" class="category-link active" data-status="all">全部</a>
                            </li>
                            <li class="category-item">
                                <a href="#" class="category-link" data-status="new">全新</a>
                            </li>
                            <li class="category-item">
                                <a href="#" class="category-link" data-status="used">二手</a>
                            </li>
                        </ul>
                    </div>
                </aside>
                
                <!-- 主要内容区 -->
                <div class="main-content">
                    <div class="market-header">
                        <h1>市场</h1>
                        <button class="btn btn-primary" id="sellBtn">发布商品</button>
                    </div>
                    
                    <div class="market-filters">
                        <div class="filter-group">
                            <span class="filter-label">排序:</span>
                            <select class="filter-select" id="sortSelect">
                                <option value="latest">最新发布</option>
                                <option value="price-low">价格从低到高</option>
                                <option value="price-high">价格从高到低</option>
                                <option value="popular">最受欢迎</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="products-list" id="productsList">
                        <!-- 动态加载 -->
                    </div>
                    
                    <div class="pagination" id="pagination">
                        <!-- 动态加载 -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 社区平台. 保留所有权利.</p>
            </div>
        </div>
    </footer>

    <!-- 登录模态框 -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>登录</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">邮箱</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">密码</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">登录</button>
            </form>
            <div class="modal-footer">
                <p>还没有账号？<a href="#" id="showRegister">立即注册</a></p>
            </div>
        </div>
    </div>

    <!-- 注册模态框 -->
    <div class="modal" id="registerModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>注册</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="registerUsername">用户名</label>
                    <input type="text" id="registerUsername" required>
                </div>
                <div class="form-group">
                    <label for="registerEmail">邮箱</label>
                    <input type="email" id="registerEmail" required>
                </div>
                <div class="form-group">
                    <label for="registerPassword">密码</label>
                    <input type="password" id="registerPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="registerConfirmPassword">确认密码</label>
                    <input type="password" id="registerConfirmPassword" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">注册</button>
            </form>
            <div class="modal-footer">
                <p>已有账号？<a href="#" id="showLogin">立即登录</a></p>
            </div>
        </div>
    </div>

    <!-- 发布商品模态框 -->
    <div class="modal" id="sellModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>发布商品</h2>
            <form id="sellForm">
                <div class="form-group">
                    <label for="productCategory">分类</label>
                    <select id="productCategory" required>
                        <!-- 动态加载 -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="productTitle">商品名称</label>
                    <input type="text" id="productTitle" placeholder="请输入商品名称" required>
                </div>
                <div class="form-group">
                    <label for="productDescription">商品描述</label>
                    <textarea id="productDescription" rows="5" placeholder="请详细描述商品信息..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="productPrice">价格 (¥)</label>
                    <input type="number" id="productPrice" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label for="originalPrice">原价 (¥)</label>
                    <input type="number" id="originalPrice" step="0.01" min="0">
                </div>
                <div class="form-group">
                    <label for="productCondition">商品状态</label>
                    <select id="productCondition" required>
                        <option value="new">全新</option>
                        <option value="used">二手</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="productImages">商品图片</label>
                    <input type="file" id="productImages" multiple accept="image/*" required>
                    <small>最多上传5张图片，每张不超过5MB</small>
                </div>
                <button type="submit" class="btn btn-primary btn-block">发布商品</button>
            </form>
        </div>
    </div>


    
    <!-- JavaScript -->
    <script src="../js/config.js?v=2"></script>
    <script src="../js/auth.js?v=2"></script>
    <script src="../js/market.js?v=2"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 社区平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="ti ti-brand-community"></i> 社区平台</h2>
                <p>管理后台</p>
            </div>
            <nav class="sidebar-nav">
                <a href="admin.html" class="active"><i class="ti ti-dashboard"></i> 仪表盘</a>
                <a href="admin-forum.html"><i class="ti ti-message-circle"></i> 论坛管理</a>
                <a href="admin-market.html"><i class="ti ti-shopping-bag"></i> 商城管理</a>
                <a href="admin-users.html"><i class="ti ti-users"></i> 用户管理</a>
                <div class="sidebar-section">系统</div>
                <a href="admin-settings.html"><i class="ti ti-settings"></i> 网站设置</a>
                <a href="../index.html" target="_blank"><i class="ti ti-external-link"></i> 查看前台</a>
                <a href="#" id="adminLogout"><i class="ti ti-logout"></i> 退出登录</a>
            </nav>
        </aside>

        <!-- 主内容 -->
        <main class="admin-main">
            <div class="admin-topbar">
                <div style="display:flex;align-items:center;gap:0.75rem">
                    <button class="btn btn-ghost" id="sidebarToggle" style="display:none;padding:0.375rem">
                        <i class="ti ti-menu-2" style="font-size:1.25rem"></i>
                    </button>
                    <h1>仪表盘</h1>
                </div>
                <div style="display:flex;align-items:center;gap:0.75rem">
                    <span style="font-size:var(--font-size-sm);color:var(--text-secondary)">
                        <i class="ti ti-user-circle"></i> 管理员
                    </span>
                </div>
            </div>

            <div class="admin-content">
                <!-- 统计卡片 -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(79,70,229,0.1);color:var(--primary-color)">
                            <i class="ti ti-users"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" id="statUsers">0</div>
                            <div class="stat-label">注册用户</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(16,185,129,0.1);color:var(--success-color)">
                            <i class="ti ti-message-circle"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" id="statPosts">0</div>
                            <div class="stat-label">论坛帖子</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(245,158,11,0.1);color:var(--warning-color)">
                            <i class="ti ti-shopping-bag"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" id="statProducts">0</div>
                            <div class="stat-label">商品数量</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(239,68,68,0.1);color:var(--danger-color)">
                            <i class="ti ti-clock"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" id="statOrders">0</div>
                            <div class="stat-label">待处理订单</div>
                        </div>
                    </div>
                </div>

                <!-- 用户和帖子 -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                    <div class="admin-card">
                        <div class="admin-card-header">
                            <h2><i class="ti ti-users" style="margin-right:0.375rem"></i>最新注册用户</h2>
                            <a href="admin-users.html" class="btn-admin btn-admin-outline">查看全部</a>
                        </div>
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>用户</th>
                                    <th>注册时间</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody id="recentUsers"></tbody>
                        </table>
                    </div>

                    <div class="admin-card">
                        <div class="admin-card-header">
                            <h2><i class="ti ti-message-circle" style="margin-right:0.375rem"></i>最新帖子</h2>
                            <a href="admin-forum.html" class="btn-admin btn-admin-outline">查看全部</a>
                        </div>
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>标题</th>
                                    <th>作者</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody id="recentPosts"></tbody>
                        </table>
                    </div>
                </div>

                <!-- 商品列表 -->
                <div class="admin-card" style="margin-top:1rem">
                    <div class="admin-card-header">
                        <h2><i class="ti ti-shopping-bag" style="margin-right:0.375rem"></i>最新商品</h2>
                        <a href="admin-market.html" class="btn-admin btn-admin-outline">查看全部</a>
                    </div>
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>商品名称</th>
                                <th>卖家</th>
                                <th>价格</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="recentProducts"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = 'admin-login.html';
        }
        document.getElementById('adminLogout').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'admin-login.html';
        });

        // 侧边栏切换（移动端）
        var sidebarToggle = document.getElementById('sidebarToggle');
        var sidebar = document.getElementById('sidebar');
        if (window.innerWidth <= 768) sidebarToggle.style.display = 'block';
        window.addEventListener('resize', function() {
            sidebarToggle.style.display = window.innerWidth <= 768 ? 'block' : 'none';
        });
        sidebarToggle.addEventListener('click', function() {
            sidebar.classList.toggle('show');
        });

        // 加载真实数据
        var users = JSON.parse(localStorage.getItem('users') || '[]');
        var posts = JSON.parse(localStorage.getItem('posts') || '[]');
        var products = JSON.parse(localStorage.getItem('products') || '[]');

        document.getElementById('statUsers').textContent = users.length;
        document.getElementById('statPosts').textContent = posts.length;
        document.getElementById('statProducts').textContent = products.length;
        document.getElementById('statOrders').textContent = '0';

        // 最新用户
        var recentUsersHtml = '';
        var sortedUsers = users.slice().sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); }).slice(0, 5);
        sortedUsers.forEach(function(user) {
            var date = user.createdAt ? new Date(user.createdAt).toLocaleDateString('zh-CN') : '-';
            var avUrl = user.avatar || '../images/default-avatar.png';
            if (avUrl.indexOf('data:') !== 0 && avUrl.indexOf('http') !== 0) avUrl = '../' + avUrl;
            recentUsersHtml += '<tr><td><div style="display:flex;align-items:center;gap:0.5rem"><img src="' + avUrl + '" style="width:1.75rem;height:1.75rem;border-radius:50%;object-fit:cover" alt=""> ' + (user.username || '未知') + '</div></td><td>' + date + '</td><td><span class="badge badge-success">正常</span></td></tr>';
        });
        if (sortedUsers.length === 0) recentUsersHtml = '<tr><td colspan="3" style="text-align:center;color:var(--text-light);padding:2rem">暂无用户</td></tr>';
        document.getElementById('recentUsers').innerHTML = recentUsersHtml;

        // 最新帖子
        var recentPostsHtml = '';
        var sortedPosts = posts.slice().sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); }).slice(0, 5);
        sortedPosts.forEach(function(post) {
            var author = users.find(function(u) { return u.id === post.authorId; }) || {};
            recentPostsHtml += '<tr><td>' + (post.title || '-') + '</td><td>' + (author.username || '匿名') + '</td><td><span class="badge badge-success">已发布</span></td></tr>';
        });
        if (sortedPosts.length === 0) recentPostsHtml = '<tr><td colspan="3" style="text-align:center;color:var(--text-light);padding:2rem">暂无帖子</td></tr>';
        document.getElementById('recentPosts').innerHTML = recentPostsHtml;

        // 最新商品
        var recentProductsHtml = '';
        var sortedProducts = products.slice().sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); }).slice(0, 5);
        sortedProducts.forEach(function(product) {
            var seller = users.find(function(u) { return u.id === product.sellerId; }) || {};
            recentProductsHtml += '<tr><td>' + (product.title || '-') + '</td><td>' + (seller.username || '匿名') + '</td><td>¥' + (product.price || 0).toFixed(2) + '</td><td><span class="badge badge-success">在售</span></td><td><a href="product.html?id=' + product.id + '" class="btn-admin btn-admin-outline" target="_blank">查看</a></td></tr>';
        });
        if (sortedProducts.length === 0) recentProductsHtml = '<tr><td colspan="5" style="text-align:center;color:var(--text-light);padding:2rem">暂无商品</td></tr>';
        document.getElementById('recentProducts').innerHTML = recentProductsHtml;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 社区平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">
    <link rel="stylesheet" href="../css/style.css?v=7">
    <link rel="stylesheet" href="../css/responsive.css?v=7">
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i class="ti ti-brand-community"></i></div>
                <div>
                    <h2>社区平台</h2>
                    <p>管理后台</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="admin.html" class="active"><i class="ti ti-dashboard"></i> 仪表盘</a>
                <a href="admin-forum.html"><i class="ti ti-message-circle"></i> 论坛管理 <span class="nav-badge" id="navBadgePosts"></span></a>

                <a href="admin-users.html"><i class="ti ti-users"></i> 用户管理</a>
                <div class="sidebar-nav-label">系统</div>
                <a href="admin-settings.html"><i class="ti ti-settings"></i> 网站设置</a>
                <a href="../index.html" target="_blank"><i class="ti ti-external-link"></i> 查看前台</a>
                <a href="#" id="adminLogout"><i class="ti ti-logout"></i> 退出登录</a>
            </nav>
            <div class="sidebar-user">
                <div class="sidebar-user-avatar"><i class="ti ti-user-circle"></i></div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name">管理员</div>
                    <div class="sidebar-user-role">超级管理员</div>
                </div>
            </div>
        </aside>

        <!-- 主内容 -->
        <main class="admin-main">
            <div class="admin-topbar">
                <div class="admin-topbar-left">
                    <button class="admin-topbar-btn" id="sidebarToggle" style="display:none">
                        <i class="ti ti-menu-2" style="font-size:1.25rem"></i>
                    </button>
                    <h1>仪表盘</h1>
                </div>
                <div class="admin-topbar-right">
                    <button class="admin-topbar-btn" title="通知">
                        <i class="ti ti-bell"></i>
                        <span class="notif-dot"></span>
                    </button>
                    <button class="admin-topbar-btn" title="设置">
                        <i class="ti ti-settings"></i>
                    </button>
                </div>
            </div>

            <div class="admin-content">
                <!-- 欢迎横幅 -->
                <div class="welcome-banner">
                    <h2>欢迎回来，管理员</h2>
                    <p>这是您的社区平台管理面板，以下是今日数据概览。</p>
                    <div class="welcome-stats">
                        <div class="welcome-stat">
                            <div class="welcome-stat-value" id="welcomeUsers">0</div>
                            <div class="welcome-stat-label">总用户</div>
                        </div>
                        <div class="welcome-stat">
                            <div class="welcome-stat-value" id="welcomePosts">0</div>
                            <div class="welcome-stat-label">总帖子</div>
                        </div>
                        <div class="welcome-stat">
                            <div class="welcome-stat-value" id="welcomeToday">0</div>
                            <div class="welcome-stat-label">今日新增</div>
                        </div>
                    </div>
                </div>

                <!-- 统计卡片 -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(79,70,229,0.1);color:var(--primary-color)">
                            <i class="ti ti-users"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" id="statUsers">0</div>
                            <div class="stat-label">注册用户</div>
                            <div class="stat-change up" id="statUsersChange"><i class="ti ti-trending-up"></i> +0</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(16,185,129,0.1);color:var(--success-color)">
                            <i class="ti ti-message-circle"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" id="statPosts">0</div>
                            <div class="stat-label">论坛帖子</div>
                            <div class="stat-change up" id="statPostsChange"><i class="ti ti-trending-up"></i> +0</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(239,68,68,0.1);color:var(--danger-color)">
                            <i class="ti ti-clock"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" id="statOrders">0</div>
                            <div class="stat-label">待处理订单</div>
                            <div class="stat-change down" id="statOrdersChange"><i class="ti ti-minus"></i> 无变化</div>
                        </div>
                    </div>
                </div>

                <!-- 快捷操作 -->
                <div class="quick-actions">
                    <a href="admin-forum.html" class="quick-action">
                        <div class="quick-action-icon" style="background:rgba(79,70,229,0.1);color:var(--primary-color)"><i class="ti ti-plus"></i></div>
                        <div>
                            <div class="quick-action-text">审核帖子</div>
                            <div class="quick-action-desc">管理论坛内容</div>
                        </div>
                    </a>

                    <a href="admin-users.html" class="quick-action">
                        <div class="quick-action-icon" style="background:rgba(245,158,11,0.1);color:var(--warning-color)"><i class="ti ti-user-check"></i></div>
                        <div>
                            <div class="quick-action-text">用户管理</div>
                            <div class="quick-action-desc">查看所有用户</div>
                        </div>
                    </a>
                    <a href="admin-settings.html" class="quick-action">
                        <div class="quick-action-icon" style="background:rgba(239,68,68,0.1);color:var(--danger-color)"><i class="ti ti-tool"></i></div>
                        <div>
                            <div class="quick-action-text">系统设置</div>
                            <div class="quick-action-desc">配置网站参数</div>
                        </div>
                    </a>
                </div>

                <!-- 数据图表 + 活动 -->
                <div style="display:grid;grid-template-columns:2fr 1fr;gap:1rem;margin-bottom:1rem">
                    <!-- 数据趋势 -->
                    <div class="admin-card">
                        <div class="admin-card-header">
                            <h2><i class="ti ti-chart-bar" style="margin-right:0.375rem"></i>数据趋势（最近7天）</h2>
                        </div>
                        <div class="chart-container">
                            <div style="display:flex;gap:1.5rem;margin-bottom:1rem">
                                <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--primary-color)"></div>帖子</div>

                                <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--warning-color)"></div>用户</div>
                            </div>
                            <div class="chart-bars" id="chartBars"></div>
                            <div class="chart-labels" id="chartLabels"></div>
                        </div>
                    </div>

                    <!-- 最近活动 -->
                    <div class="admin-card">
                        <div class="admin-card-header">
                            <h2><i class="ti ti-activity" style="margin-right:0.375rem"></i>最近活动</h2>
                        </div>
                        <div class="activity-timeline" id="activityTimeline"></div>
                    </div>
                </div>

                <!-- 最新数据 -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                    <div class="admin-card">
                        <div class="admin-card-header">
                            <h2><i class="ti ti-users" style="margin-right:0.375rem"></i>最新用户</h2>
                            <a href="admin-users.html" class="btn-admin btn-admin-outline"><i class="ti ti-arrow-right"></i> 查看全部</a>
                        </div>
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>用户</th>
                                    <th>注册时间</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody id="recentUsers"></tbody>
                        </table>
                    </div>

                    <div class="admin-card">
                        <div class="admin-card-header">
                            <h2><i class="ti ti-message-circle" style="margin-right:0.375rem"></i>最新帖子</h2>
                            <a href="admin-forum.html" class="btn-admin btn-admin-outline"><i class="ti ti-arrow-right"></i> 查看全部</a>
                        </div>
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>标题</th>
                                    <th>作者</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody id="recentPosts"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = 'admin-login.html';
        }
        document.getElementById('adminLogout').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'admin-login.html';
        });

        // 侧边栏切换
        var sidebarToggle = document.getElementById('sidebarToggle');
        var sidebar = document.getElementById('sidebar');
        function checkSidebar() {
            sidebarToggle.style.display = window.innerWidth <= 1024 ? 'flex' : 'none';
        }
        checkSidebar();
        window.addEventListener('resize', checkSidebar);
        sidebarToggle.addEventListener('click', function() {
            sidebar.classList.toggle('show');
        });
        document.addEventListener('click', function(e) {
            if (window.innerWidth <= 1024 && !sidebar.contains(e.target) && !sidebarToggle.contains(e.target)) {
                sidebar.classList.remove('show');
            }
        });

        // 加载数据
        var users = JSON.parse(localStorage.getItem('users') || '[]');
        var posts = JSON.parse(localStorage.getItem('posts') || '[]');
        var orders = JSON.parse(localStorage.getItem('orders') || '[]');

        // 统计数字动画
        function animateNumber(el, target) {
            var current = 0;
            var step = Math.max(1, Math.ceil(target / 30));
            var timer = setInterval(function() {
                current += step;
                if (current >= target) {
                    current = target;
                    clearInterval(timer);
                }
                el.textContent = current;
            }, 20);
        }

        animateNumber(document.getElementById('statUsers'), users.length);
        animateNumber(document.getElementById('statPosts'), posts.length);
        animateNumber(document.getElementById('statOrders'), orders.filter(function(o) { return o.status === 'pending'; }).length);

        // 欢迎区
        document.getElementById('welcomeUsers').textContent = users.length;
        document.getElementById('welcomePosts').textContent = posts.length;
        // 今日新增
        var today = new Date().toDateString();
        var todayNew = users.filter(function(u) { return new Date(u.createdAt).toDateString() === today; }).length;
        document.getElementById('welcomeToday').textContent = todayNew;

        // 变化统计
        var weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
        var newUsersWeek = users.filter(function(u) { return new Date(u.createdAt) > weekAgo; }).length;
        var newPostsWeek = posts.filter(function(p) { return new Date(p.createdAt) > weekAgo; }).length;
        document.getElementById('statUsersChange').innerHTML = '<i class="ti ti-trending-up"></i> +' + newUsersWeek + ' 本周';
        document.getElementById('statPostsChange').innerHTML = '<i class="ti ti-trending-up"></i> +' + newPostsWeek + ' 本周';

        // 导航徽章
        var pendingPosts = posts.filter(function(p) { return p.status === 'pending'; }).length;
        if (pendingPosts > 0) document.getElementById('navBadgePosts').textContent = pendingPosts;
        else document.getElementById('navBadgePosts').style.display = 'none';

        // 数据图表
        var days = ['日', '一', '二', '三', '四', '五', '六'];
        var chartBars = document.getElementById('chartBars');
        var chartLabels = document.getElementById('chartLabels');
        var maxVal = 1;
        var chartData = [];
        for (var i = 6; i >= 0; i--) {
            var d = new Date(Date.now() - i * 86400000);
            var dayStr = d.toDateString();
            var pCount = posts.filter(function(p) { return new Date(p.createdAt).toDateString() === dayStr; }).length;
            var uCount = users.filter(function(u) { return new Date(u.createdAt).toDateString() === dayStr; }).length;
            chartData.push({ posts: pCount, users: uCount });
            maxVal = Math.max(maxVal, pCount, uCount);
        }
        var colors = ['var(--primary-color)', 'var(--warning-color)'];
        var keys = ['posts', 'users'];
        chartData.forEach(function(d, i) {
            var group = document.createElement('div');
            group.style.cssText = 'flex:1;display:flex;gap:2px;align-items:flex-end;height:100%';
            keys.forEach(function(k) {
                var bar = document.createElement('div');
                bar.className = 'chart-bar ' + (k === 'posts' ? 'primary' : 'warning');
                bar.style.height = (d[k] / maxVal * 100) + '%';
                bar.title = d[k];
                group.appendChild(bar);
            });
            chartBars.appendChild(group);
            var label = document.createElement('span');
            label.textContent = '周' + days[(new Date(Date.now() - (6 - i) * 86400000)).getDay()];
            chartLabels.appendChild(label);
        });

        // 活动时间线
        var timeline = document.getElementById('activityTimeline');
        var activities = [];
        users.slice().sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); }).slice(0, 3).forEach(function(u) {
            activities.push({ type: 'success', text: '<strong>' + (u.username || '用户') + '</strong> 注册了账号', time: u.createdAt });
        });
        posts.slice().sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); }).slice(0, 3).forEach(function(p) {
            var author = users.find(function(u) { return u.id === p.authorId; }) || {};
            activities.push({ type: 'primary', text: '<strong>' + (author.username || '用户') + '</strong> 发布了帖子 <strong>' + (p.title || '').substring(0, 15) + '</strong>', time: p.createdAt });
        });
        activities.sort(function(a, b) { return new Date(b.time) - new Date(a.time); });
        activities = activities.slice(0, 6);
        if (activities.length === 0) {
            timeline.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-light)"><i class="ti ti-activity" style="font-size:2rem;display:block;margin-bottom:0.5rem"></i>暂无活动</div>';
        } else {
            timeline.innerHTML = activities.map(function(a) {
                var timeAgo = getTimeAgo(a.time);
                return '<div class="activity-item"><div class="activity-dot ' + a.type + '"></div><div class="activity-content"><div class="activity-text">' + a.text + '</div><div class="activity-time">' + timeAgo + '</div></div></div>';
            }).join('');
        }

        function getTimeAgo(dateStr) {
            if (!dateStr) return '';
            var diff = Date.now() - new Date(dateStr).getTime();
            var mins = Math.floor(diff / 60000);
            if (mins < 1) return '刚刚';
            if (mins < 60) return mins + '分钟前';
            var hours = Math.floor(mins / 60);
            if (hours < 24) return hours + '小时前';
            var days = Math.floor(hours / 24);
            if (days < 30) return days + '天前';
            return new Date(dateStr).toLocaleDateString('zh-CN');
        }

        // 最新用户
        var recentUsersHtml = '';
        var sortedUsers = users.slice().sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); }).slice(0, 5);
        sortedUsers.forEach(function(user) {
            var date = user.createdAt ? getTimeAgo(user.createdAt) : '-';
            var avUrl = user.avatar || '../images/default-avatar.png';
            if (avUrl.indexOf('data:') !== 0 && avUrl.indexOf('http') !== 0) avUrl = '../' + avUrl;
            recentUsersHtml += '<tr><td><div class="user-cell"><img src="' + avUrl + '" alt=""> ' + (user.username || '未知') + '</div></td><td>' + date + '</td><td><span class="badge badge-success"><i class="ti ti-circle-check" style="margin-right:0.25rem"></i>正常</span></td></tr>';
        });
        if (sortedUsers.length === 0) recentUsersHtml = '<tr><td colspan="3" style="text-align:center;color:var(--text-light);padding:2rem"><i class="ti ti-users" style="font-size:1.5rem;display:block;margin-bottom:0.5rem"></i>暂无用户</td></tr>';
        document.getElementById('recentUsers').innerHTML = recentUsersHtml;

        // 最新帖子
        var recentPostsHtml = '';
        var sortedPosts = posts.slice().sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); }).slice(0, 5);
        sortedPosts.forEach(function(post) {
            var author = users.find(function(u) { return u.id === post.authorId; }) || {};
            var status = post.status === 'pending' ? '<span class="badge badge-warning"><i class="ti ti-clock" style="margin-right:0.25rem"></i>待审核</span>' : '<span class="badge badge-success"><i class="ti ti-circle-check" style="margin-right:0.25rem"></i>已发布</span>';
            recentPostsHtml += '<tr><td>' + (post.title || '-') + '</td><td>' + (author.username || '匿名') + '</td><td>' + status + '</td></tr>';
        });
        if (sortedPosts.length === 0) recentPostsHtml = '<tr><td colspan="3" style="text-align:center;color:var(--text-light);padding:2rem"><i class="ti ti-message-circle" style="font-size:1.5rem;display:block;margin-bottom:0.5rem"></i>暂无帖子</td></tr>';
        document.getElementById('recentPosts').innerHTML = recentPostsHtml;

    </script>
</body>
</html>

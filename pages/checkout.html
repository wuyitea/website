<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="结算中心 - 确认订单、选择支付方式">
    <title>结算 - 社区平台</title>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <style>
        .checkout-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: var(--spacing-xl);
            padding: var(--spacing-xl) 0;
        }
        
        .checkout-section {
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: var(--spacing-xl);
            margin-bottom: var(--spacing-lg);
        }
        
        .section-title {
            font-size: var(--font-size-xl);
            font-weight: 600;
            margin-bottom: var(--spacing-lg);
            color: var(--text-primary);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--border-color);
        }
        
        .order-item {
            display: flex;
            gap: var(--spacing-md);
            padding: var(--spacing-md) 0;
            border-bottom: 1px solid var(--border-color);
        }
        
        .order-item:last-child {
            border-bottom: none;
        }
        
        .order-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: var(--border-radius);
            background-color: var(--bg-tertiary);
        }
        
        .order-info {
            flex: 1;
        }
        
        .order-title {
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: var(--spacing-xs);
        }
        
        .order-meta {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
        }
        
        .order-price {
            font-weight: 600;
            color: var(--primary-color);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }
        
        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }
        
        .payment-method {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
        }
        
        .payment-method:hover {
            border-color: var(--primary-light);
        }
        
        .payment-method.selected {
            border-color: var(--primary-color);
            background-color: rgba(79, 70, 229, 0.05);
        }
        
        .payment-method input {
            display: none;
        }
        
        .payment-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .payment-info {
            flex: 1;
        }
        
        .payment-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .payment-desc {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
        }
        
        .order-summary {
            position: sticky;
            top: 80px;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--spacing-sm);
            color: var(--text-secondary);
        }
        
        .summary-total {
            display: flex;
            justify-content: space-between;
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--border-color);
            margin-top: var(--spacing-md);
            font-size: var(--font-size-xl);
            font-weight: 700;
        }
        
        .summary-total .total-price {
            color: var(--primary-color);
        }
        
        .submit-order {
            margin-top: var(--spacing-lg);
        }
        
        .submit-order .btn {
            width: 100%;
            padding: 0.875rem;
            font-size: var(--font-size-lg);
        }
        
        .security-note {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-md);
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            text-align: center;
            justify-content: center;
        }
        
        @media (max-width: 1024px) {
            .checkout-layout {
                grid-template-columns: 1fr;
            }
            
            .order-summary {
                position: static;
            }
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="nav-brand">
                <a href="../index.html">社区平台</a>
            </div>
            <div class="nav-menu">
                <ul class="nav-links">
                    <li><a href="../index.html">首页</a></li>
                    <li><a href="forum.html">论坛</a></li>
                    <li><a href="market.html">市场</a></li>
                    <li><a href="messages.html">消息</a></li>
                </ul>
            </div>
            <div class="nav-user">
                <div class="user-actions" id="userActions" style="display: none;"></div>
                <div class="user-profile" id="userProfile">
                    <img src="../images/default-avatar.png" alt="用户头像" id="userAvatar">
                    <div class="user-dropdown">
                        <a href="profile.html">个人资料</a>
                        <a href="settings.html">设置</a>
                        <a href="#" id="logoutBtn">退出登录</a>
                    </div>
                </div>
            </div>
            <div class="nav-toggle" id="navToggle">
                <span></span><span></span><span></span>
            </div>
        </nav>
    </header>

    <main class="main">
        <div class="container">
            <h1 style="margin-bottom: var(--spacing-xl);">结算</h1>
            
            <div class="checkout-layout">
                <div class="checkout-main">
                    <div class="checkout-section">
                        <h2 class="section-title">收货信息</h2>
                        <form id="addressForm">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="receiverName">收货人姓名</label>
                                    <input type="text" id="receiverName" required>
                                </div>
                                <div class="form-group">
                                    <label for="receiverPhone">手机号码</label>
                                    <input type="tel" id="receiverPhone" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="receiverAddress">详细地址</label>
                                <input type="text" id="receiverAddress" placeholder="省/市/区/街道/门牌号" required>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="receiverZip">邮政编码</label>
                                    <input type="text" id="receiverZip">
                                </div>
                                <div class="form-group">
                                    <label for="receiverEmail">邮箱（选填）</label>
                                    <input type="email" id="receiverEmail">
                                </div>
                            </div>
                        </form>
                    </div>
                    
                    <div class="checkout-section">
                        <h2 class="section-title">支付方式</h2>
                        <div class="payment-methods">
                            <label class="payment-method selected">
                                <input type="radio" name="payment" value="alipay" checked>
                                <div class="payment-icon">💳</div>
                                <div class="payment-info">
                                    <div class="payment-name">支付宝</div>
                                    <div class="payment-desc">推荐使用，支持花呗</div>
                                </div>
                            </label>
                            <label class="payment-method">
                                <input type="radio" name="payment" value="wechat">
                                <div class="payment-icon">💬</div>
                                <div class="payment-info">
                                    <div class="payment-name">微信支付</div>
                                    <div class="payment-desc">使用微信扫码支付</div>
                                </div>
                            </label>
                            <label class="payment-method">
                                <input type="radio" name="payment" value="bank">
                                <div class="payment-icon">🏦</div>
                                <div class="payment-info">
                                    <div class="payment-name">银行卡支付</div>
                                    <div class="payment-desc">支持主流银行借记卡/信用卡</div>
                                </div>
                            </label>
                        </div>
                    </div>
                    
                    <div class="checkout-section">
                        <h2 class="section-title">订单商品</h2>
                        <div id="orderItems">
                            <!-- 动态加载 -->
                        </div>
                    </div>
                </div>
                
                <div class="checkout-sidebar">
                    <div class="checkout-section order-summary">
                        <h2 class="section-title">订单摘要</h2>
                        <div class="summary-row">
                            <span>商品金额</span>
                            <span id="subtotal">¥0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>运费</span>
                            <span id="shipping">¥0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>优惠</span>
                            <span id="discount" style="color: var(--success-color);">-¥0.00</span>
                        </div>
                        <div class="summary-total">
                            <span>实付金额</span>
                            <span class="total-price" id="totalPrice">¥0.00</span>
                        </div>
                        
                        <div class="submit-order">
                            <button class="btn btn-primary" id="submitOrderBtn">提交订单</button>
                        </div>
                        
                        <div class="security-note">
                            🔒 安全支付，保障您的交易
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 社区平台. 保留所有权利.</p>
            </div>
        </div>
    </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{var t=JSON.parse(localStorage.getItem('site_theme')||'{}');var r=document.documentElement;if(t.primaryColor){r.style.setProperty('--primary-color',t.primaryColor);var c=t.primaryColor;if(c[0]==='#'){var R=parseInt(c.slice(1,3),16),G=parseInt(c.slice(3,5),16),B=parseInt(c.slice(5,7),16);r.style.setProperty('--primary-dark','rgb('+(R>15?R-15:0)+','+(G>15?G-15:0)+','+(B>15?B-15:0)+')');r.style.setProperty('--primary-light','rgb('+(R<236?R+20:255)+','+(G<236?G+20:255)+','+(B<236?B+20:255)+')');}}if(t.secondaryColor)r.style.setProperty('--secondary-color',t.secondaryColor);if(t.successColor)r.style.setProperty('--success-color',t.successColor);if(t.warningColor)r.style.setProperty('--warning-color',t.warningColor);if(t.dangerColor)r.style.setProperty('--danger-color',t.dangerColor);if(t.infoColor)r.style.setProperty('--info-color',t.infoColor);if(t.borderRadius){r.style.setProperty('--border-radius',t.borderRadius);r.style.setProperty('--border-radius-lg',(parseFloat(t.borderRadius)*1.5)+'rem');}if(t.fontFamily)r.style.setProperty('--font-family',t.fontFamily);if(t.bgPrimary)r.style.setProperty('--bg-primary',t.bgPrimary);if(t.bgSecondary)r.style.setProperty('--bg-secondary',t.bgSecondary);if(t.textPrimary)r.style.setProperty('--text-primary',t.textPrimary);if(t.textSecondary)r.style.setProperty('--text-secondary',t.textSecondary);}catch(e){}</script>
    <script>var _sv="10";var _cv=localStorage.getItem("site_version");if(_cv&&_cv!==_sv){localStorage.setItem("site_version",_sv);location.replace(location.pathname+"?_t="+Date.now());}else{localStorage.setItem("site_version",_sv);}</script>
    <meta name="description" content="结算中心 - 确认订单、选择支付方式">
    <title>结算 - 社区平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">
    <link rel="stylesheet" href="../css/style.css?v=10">
    <link rel="stylesheet" href="../css/responsive.css?v=10">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="../index.html"><i class="ti ti-brand-community" style="margin-right:0.375rem"></i><span data-setting="siteName">社区平台</span></a>
        </div>
        <div class="nav-menu" id="navMenu">
            <ul class="nav-links">
                <li><a href="../index.html"><i class="ti ti-home"></i> <span data-copy="navHome">首页</span></a></li>
                <li><a href="forum.html"><i class="ti ti-message-circle"></i> <span data-copy="navForum">论坛</span></a></li>
                <li><a href="market.html" class="active"><i class="ti ti-shopping-bag"></i> <span data-copy="navMarket">市场</span></a></li>
                <li><a href="messages.html"><i class="ti ti-mail"></i> <span data-copy="navMessages">消息</span></a></li>
            </ul>
        </div>
        <div class="nav-user">
            <div class="user-actions" id="userActions" style="display:none">
                <button class="btn btn-ghost" id="loginBtn">登录</button>
                <button class="btn btn-primary" id="registerBtn">注册</button>
            </div>
            <div class="user-profile" id="userProfile">
                <img src="../images/default-avatar.png" alt="头像" id="userAvatar">
                <div class="user-dropdown">
                    <a href="profile.html"><i class="ti ti-user"></i> 个人资料</a>
                    <a href="settings.html"><i class="ti ti-settings"></i> 设置</a>
                    <a href="admin.html" class="admin-link" style="display:none"><i class="ti ti-dashboard"></i> 管理后台</a>
                    <a href="#" id="logoutBtn"><i class="ti ti-logout"></i> 退出登录</a>
                </div>
            </div>
        </div>
        <div class="nav-toggle" id="navToggle">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div style="max-width:1200px;margin:0 auto;padding:1.5rem 1rem">
        <h2 style="font-size:1.25rem;font-weight:600;margin-bottom:1.5rem"><i class="ti ti-receipt" style="margin-right:0.375rem"></i>结算</h2>

        <div class="forum-layout">
            <main>
                <!-- 收货信息 -->
                <div class="admin-card" style="margin-bottom:1.5rem">
                    <div class="admin-card-header">
                        <h2><i class="ti ti-map-pin" style="margin-right:0.375rem"></i>收货信息</h2>
                    </div>
                    <div style="padding:1.5rem">
                        <form id="addressForm">
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                                <div class="form-group">
                                    <label for="receiverName"><i class="ti ti-user"></i> 收货人姓名</label>
                                    <input type="text" id="receiverName" required>
                                </div>
                                <div class="form-group">
                                    <label for="receiverPhone"><i class="ti ti-phone"></i> 手机号码</label>
                                    <input type="tel" id="receiverPhone" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="receiverAddress"><i class="ti ti-home"></i> 详细地址</label>
                                <input type="text" id="receiverAddress" placeholder="省/市/区/街道/门牌号" required>
                            </div>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                                <div class="form-group">
                                    <label for="receiverZip"><i class="ti ti-mail"></i> 邮政编码</label>
                                    <input type="text" id="receiverZip">
                                </div>
                                <div class="form-group">
                                    <label for="receiverEmail"><i class="ti ti-at"></i> 邮箱（选填）</label>
                                    <input type="email" id="receiverEmail">
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- 支付方式 -->
                <div class="admin-card" style="margin-bottom:1.5rem">
                    <div class="admin-card-header">
                        <h2><i class="ti ti-credit-card" style="margin-right:0.375rem"></i>支付方式</h2>
                    </div>
                    <div style="padding:1.5rem">
                        <div style="display:flex;flex-direction:column;gap:0.75rem">
                            <label class="payment-method selected" style="display:flex;align-items:center;gap:1rem;padding:1rem;border:2px solid var(--primary-color);border-radius:var(--border-radius);cursor:pointer;background:rgba(79,70,229,0.05)">
                                <input type="radio" name="payment" value="alipay" checked style="display:none">
                                <div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:1.5rem"><i class="ti ti-credit-card" style="color:var(--primary-color)"></i></div>
                                <div style="flex:1">
                                    <div style="font-weight:500;color:var(--text-primary)">支付宝</div>
                                    <div style="font-size:0.875rem;color:var(--text-secondary)">推荐使用，支持花呗</div>
                                </div>
                            </label>
                            <label class="payment-method" style="display:flex;align-items:center;gap:1rem;padding:1rem;border:2px solid var(--border-color);border-radius:var(--border-radius);cursor:pointer">
                                <input type="radio" name="payment" value="wechat" style="display:none">
                                <div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:1.5rem"><i class="ti ti-brand-wechat" style="color:#07c160"></i></div>
                                <div style="flex:1">
                                    <div style="font-weight:500;color:var(--text-primary)">微信支付</div>
                                    <div style="font-size:0.875rem;color:var(--text-secondary)">使用微信扫码支付</div>
                                </div>
                            </label>
                            <label class="payment-method" style="display:flex;align-items:center;gap:1rem;padding:1rem;border:2px solid var(--border-color);border-radius:var(--border-radius);cursor:pointer">
                                <input type="radio" name="payment" value="bank" style="display:none">
                                <div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:1.5rem"><i class="ti ti-building-bank" style="color:var(--text-secondary)"></i></div>
                                <div style="flex:1">
                                    <div style="font-weight:500;color:var(--text-primary)">银行卡支付</div>
                                    <div style="font-size:0.875rem;color:var(--text-secondary)">支持主流银行借记卡/信用卡</div>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 订单商品 -->
                <div class="admin-card">
                    <div class="admin-card-header">
                        <h2><i class="ti ti-shopping-cart" style="margin-right:0.375rem"></i>订单商品</h2>
                    </div>
                    <div style="padding:1.5rem" id="orderItems"></div>
                </div>
            </main>

            <aside class="forum-sidebar">
                <div class="admin-card" style="position:sticky;top:80px">
                    <div class="admin-card-header">
                        <h2><i class="ti ti-calculator" style="margin-right:0.375rem"></i>订单摘要</h2>
                    </div>
                    <div style="padding:1.5rem">
                        <div style="display:flex;justify-content:space-between;margin-bottom:0.75rem;color:var(--text-secondary)">
                            <span>商品金额</span>
                            <span id="subtotal">¥0.00</span>
                        </div>
                        <div style="display:flex;justify-content:space-between;margin-bottom:0.75rem;color:var(--text-secondary)">
                            <span>运费</span>
                            <span id="shipping">¥0.00</span>
                        </div>
                        <div style="display:flex;justify-content:space-between;margin-bottom:0.75rem;color:var(--text-success)">
                            <span>优惠</span>
                            <span id="discount">-¥0.00</span>
                        </div>
                        <div style="display:flex;justify-content:space-between;padding-top:1rem;border-top:1px solid var(--border-color);margin-top:1rem;font-size:1.125rem;font-weight:700">
                            <span>实付金额</span>
                            <span style="color:var(--primary-color)" id="totalPrice">¥0.00</span>
                        </div>

                        <button class="btn btn-primary" id="submitOrderBtn" style="width:100%;margin-top:1.5rem;padding:0.875rem;font-size:1rem">
                            <i class="ti ti-check"></i> 提交订单
                        </button>

                        <div style="display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-top:1rem;font-size:0.875rem;color:var(--text-secondary)">
                            <i class="ti ti-lock"></i> 安全支付，保障您的交易
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 <span data-setting="siteName">社区平台</span>. 保留所有权利. <span data-setting="siteICP" style="display:none"></span></p>
            </div>
        </div>
    </footer>

    <script src="../js/config.js?v=10"></script>
    <script src="../js/auth.js?v=10"></script>
    <script src="../js/checkout.js?v=10"></script>
</body>
</html>

    <script>try{var t=JSON.parse(localStorage.getItem('site_theme')||'{}');var r=document.documentElement;if(t.primaryColor){r.style.setProperty('--primary-color',t.primaryColor);var c=t.primaryColor;if(c[0]==='#'){var R=parseInt(c.slice(1,3),16),G=parseInt(c.slice(3,5),16),B=parseInt(c.slice(5,7),16);r.style.setProperty('--primary-dark','rgb('+(R>15?R-15:0)+','+(G>15?G-15:0)+','+(B>15?B-15:0)+')');r.style.setProperty('--primary-light','rgb('+(R<236?R+20:255)+','+(G<236?G+20:255)+','+(B<236?B+20:255)+')');}}if(t.secondaryColor)r.style.setProperty('--secondary-color',t.secondaryColor);if(t.successColor)r.style.setProperty('--success-color',t.successColor);if(t.warningColor)r.style.setProperty('--warning-color',t.warningColor);if(t.dangerColor)r.style.setProperty('--danger-color',t.dangerColor);if(t.infoColor)r.style.setProperty('--info-color',t.infoColor);if(t.borderRadius){r.style.setProperty('--border-radius',t.borderRadius);r.style.setProperty('--border-radius-lg',(parseFloat(t.borderRadius)*1.5)+'rem');}if(t.fontFamily)r.style.setProperty('--font-family',t.fontFamily);if(t.bgPrimary)r.style.setProperty('--bg-primary',t.bgPrimary);if(t.bgSecondary)r.style.setProperty('--bg-secondary',t.bgSecondary);if(t.textPrimary)r.style.setProperty('--text-primary',t.textPrimary);if(t.textSecondary)r.style.setProperty('--text-secondary',t.textSecondary);}catch(e){}</script>

        .gallery-container{position:relative;width:100%;overflow:hidden;background:#000}
        .gallery-track{display:flex;transition:transform 0.5s ease}
        .gallery-slide{flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .gallery-slide img,.gallery-slide video{display:block;max-width:100%;max-height:100%;object-fit:contain}
        .gallery-btn{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;border:none;background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);color:#fff;font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3;transition:background 0.3s}
        .gallery-btn:hover{background:rgba(255,255,255,0.3)}
        .gallery-dots{display:flex;gap:10px;justify-content:center;padding:1rem 0}
        .gallery-dot{width:10px;height:10px;border-radius:50%;background:rgba(0,0,0,0.2);cursor:pointer;transition:all 0.3s}
        .gallery-dot.active{background:var(--primary-color);transform:scale(1.3)}

    <script src="../js/config.js?v=13"></script>
    <script>
    var galleryIndex = 0, galleryTimer = null;
    function loadCopySettings() {
        var saved = localStorage.getItem('admin_settings_copy');
        if (!saved) return;
        try {
            var s = JSON.parse(saved);
            if (s.display1Title) {
                var siteName = '社区平台';
                try { var gs = JSON.parse(localStorage.getItem('admin_settings_general') || '{}'); if (gs.siteName) siteName = gs.siteName; } catch(e) {}
                document.title = s.display1Title + ' - ' + siteName;
            }
            if (s.display1Empty) {
                var el = document.getElementById('forumFallback');
                if (el) {
                    var p = el.querySelector('p');
                    if (p) p.textContent = s.display1Empty;
                }
            }
        } catch(e) {}
    }
    function loadForumSettings() {
        var s = {};
        try { s = JSON.parse(localStorage.getItem('admin_settings_display1') || '{}'); } catch(e) {}
        if (s.showNav === false) { var n = document.getElementById('forumNav'); if (n) n.style.display = 'none'; }
        if (s.showFooter === false) { var f = document.getElementById('forumFooter'); if (f) f.style.display = 'none'; }
        return s;
    }
    function loadForumGallery() {
        var settings = loadForumSettings();
        var saved = localStorage.getItem('admin_display1_slides');
        var slides = [];
        try { slides = saved ? JSON.parse(saved) : []; } catch(e) { slides = []; }
        slides = slides.filter(function(s) { return s.media; });
        if (!slides.length) {
            document.getElementById('forumGallery').style.display = 'none';
            document.getElementById('forumFallback').style.display = '';
            return;
        }
        document.getElementById('forumGallery').style.display = '';
        document.getElementById('forumFallback').style.display = 'none';
        var container = document.getElementById('galleryContainer');
        var track = document.getElementById('galleryTrack');
        var dotsEl = document.getElementById('galleryDots');
        var h = parseInt(localStorage.getItem('admin_display1_height')) || 500;
        container.style.height = h + 'px';
        track.innerHTML = slides.map(function(s) {
            var inner = '';
            if (s.type === 'video') {
                inner = '<video src="' + s.media + '" muted loop playsinline autoplay style="width:100%;height:100%;object-fit:contain"></video>';
            } else {
                inner = '<img src="' + s.media + '" alt="" style="width:100%;height:100%;object-fit:contain">';
            }
            var wrap = s.link ? '<a href="' + s.link + '" target="_blank" style="display:flex;width:100%;height:100%;align-items:center;justify-content:center">' + inner + '</a>' : '<div style="display:flex;width:100%;height:100%;align-items:center;justify-content:center">' + inner + '</div>';
            return '<div class="gallery-slide" style="width:100%;height:' + h + 'px">' + wrap + '</div>';
        }).join('');
        dotsEl.innerHTML = slides.map(function(_, i) {
            return '<div onclick="goGallery(' + i + ')" class="gallery-dot' + (i === 0 ? ' active' : '') + '"></div>';
        }).join('');
        clearInterval(galleryTimer);
        var autoPlay = settings.autoPlay !== false;
        var interval = settings.interval || 5000;
        if (slides.length > 1 && autoPlay) { galleryTimer = setInterval(galleryNext, interval); }
    }
    function updateGallery() {
        var track = document.getElementById('galleryTrack');
        var dots = document.getElementById('galleryDots');
        if (!track.children.length) return;
        track.style.transform = 'translateX(-' + (galleryIndex * 100) + '%)';
        Array.from(dots.children).forEach(function(d, i) {
            d.classList.toggle('active', i === galleryIndex);
        });
        var videos = track.querySelectorAll('video');
        videos.forEach(function(v, i) { i === galleryIndex ? v.play().catch(function(){}) : v.pause(); });
    }
    function galleryNext() { var t = document.getElementById('galleryTrack').children.length; if (!t) return; galleryIndex = (galleryIndex + 1) % t; updateGallery(); }
    function galleryPrev() { var t = document.getElementById('galleryTrack').children.length; if (!t) return; galleryIndex = (galleryIndex - 1 + t) % t; updateGallery(); }
    function goGallery(i) { galleryIndex = i; updateGallery(); }
    loadCopySettings();
    loadForumGallery();
    </script>

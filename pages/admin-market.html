<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商城管理 - 社区平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="ti ti-brand-community"></i> 社区平台</h2>
                <p>管理后台</p>
            </div>
            <nav class="sidebar-nav">
                <a href="admin.html"><i class="ti ti-dashboard"></i> 仪表盘</a>
                <a href="admin-forum.html"><i class="ti ti-message-circle"></i> 论坛管理</a>
                <a href="admin-market.html" class="active"><i class="ti ti-shopping-bag"></i> 商城管理</a>
                <a href="admin-users.html"><i class="ti ti-users"></i> 用户管理</a>
                <div class="sidebar-section">系统</div>
                <a href="admin-settings.html"><i class="ti ti-settings"></i> 网站设置</a>
                <a href="../index.html" target="_blank"><i class="ti ti-external-link"></i> 查看前台</a>
                <a href="#" id="adminLogout"><i class="ti ti-logout"></i> 退出登录</a>
            </nav>
        </aside>

        <main class="admin-main">
            <div class="admin-topbar">
                <div style="display:flex;align-items:center;gap:0.75rem">
                    <button class="btn btn-ghost" id="sidebarToggle" style="display:none;padding:0.375rem">
                        <i class="ti ti-menu-2" style="font-size:1.25rem"></i>
                    </button>
                    <h1>商城管理</h1>
                </div>
                <div style="display:flex;align-items:center;gap:0.75rem">
                    <span style="font-size:var(--font-size-sm);color:var(--text-secondary)">
                        <i class="ti ti-user-circle"></i> 管理员
                    </span>
                </div>
            </div>

            <div class="admin-content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(79,70,229,0.1);color:var(--primary-color)">
                            <i class="ti ti-package"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value">43</div>
                            <div class="stat-label">总商品数</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(16,185,129,0.1);color:var(--success-color)">
                            <i class="ti ti-check"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value">38</div>
                            <div class="stat-label">在售中</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(245,158,11,0.1);color:var(--warning-color)">
                            <i class="ti ti-clock"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value">3</div>
                            <div class="stat-label">待审核</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(239,68,68,0.1);color:var(--danger-color)">
                            <i class="ti ti-coins"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value">¥2.4w</div>
                            <div class="stat-label">总成交额</div>
                        </div>
                    </div>
                </div>

                <div class="admin-card">
                    <div class="admin-card-header">
                        <h2><i class="ti ti-shopping-bag" style="margin-right:0.375rem"></i>商品列表</h2>
                        <div class="card-actions">
                            <input type="text" class="admin-search" placeholder="搜索商品..." id="productSearch">
                            <select class="admin-filter" id="productFilter">
                                <option value="all">全部状态</option>
                                <option value="onsale">在售</option>
                                <option value="pending">待审核</option>
                                <option value="sold">已售出</option>
                                <option value="removed">已下架</option>
                            </select>
                            <select class="admin-filter" id="categoryFilter">
                                <option value="all">全部分类</option>
                                <option value="electronics">数码电子</option>
                                <option value="clothing">服装鞋帽</option>
                                <option value="home">家居生活</option>
                                <option value="other">其他</option>
                            </select>
                        </div>
                    </div>
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>商品名称</th>
                                <th>卖家</th>
                                <th>价格</th>
                                <th>分类</th>
                                <th>上架时间</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="productTableBody">
                        </tbody>
                    </table>
                    <div class="admin-pagination">
                        <span class="pagination-info" id="paginationInfo">显示 0 / 共 0 条</span>
                        <div class="pagination-btns">
                            <button disabled>&laquo;</button>
                            <button class="active">1</button>
                            <button>2</button>
                            <button>3</button>
                            <button>&raquo;</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="admin-modal-overlay" id="productModal">
        <div class="admin-modal">
            <div class="admin-modal-header">
                <h3><i class="ti ti-shopping-bag" style="margin-right:0.375rem"></i>商品详情</h3>
                <button class="admin-modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
            </div>
            <div class="admin-modal-body">
                <div class="detail-grid">
                    <div class="detail-item detail-full">
                        <div class="label">商品名称</div>
                        <div class="value" id="modalProductName">MacBook Pro 2024 M3</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">卖家</div>
                        <div class="value" id="modalProductSeller">小明</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">价格</div>
                        <div class="value" id="modalProductPrice">¥12,800</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">分类</div>
                        <div class="value" id="modalProductCategory">数码电子</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">状态</div>
                        <div class="value" id="modalProductStatus"><span class="badge badge-success">在售</span></div>
                    </div>
                    <div class="detail-item detail-full">
                        <div class="label">描述</div>
                        <div class="value" id="modalProductDesc">这是一台2024年款MacBook Pro...</div>
                    </div>
                </div>
            </div>
            <div class="admin-modal-footer">
                <button class="btn-admin btn-admin-outline" onclick="closeModal()"><i class="ti ti-x" style="margin-right:0.25rem"></i>关闭</button>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = 'admin-login.html';
        }
        document.getElementById('adminLogout').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'admin-login.html';
        });

        var sidebarToggle = document.getElementById('sidebarToggle');
        var sidebar = document.getElementById('sidebar');
        if (window.innerWidth <= 768) sidebarToggle.style.display = 'block';
        window.addEventListener('resize', function() {
            sidebarToggle.style.display = window.innerWidth <= 768 ? 'block' : 'none';
        });
        sidebarToggle.addEventListener('click', function() {
            sidebar.classList.toggle('show');
        });

        function loadProducts() {
            var products = JSON.parse(localStorage.getItem('products') || '[]');
            var users = JSON.parse(localStorage.getItem('users') || '[]');
            var tbody = document.getElementById('productTableBody');

            var total = products.length;
            var onsale = products.filter(function(p) { return p.status === 'onsale'; }).length;
            var pending = products.filter(function(p) { return p.status === 'pending'; }).length;
            var cards = document.querySelectorAll('.stat-card .stat-value');
            cards[0].textContent = total;
            cards[1].textContent = onsale;
            cards[2].textContent = pending;

            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-light);padding:2rem"><i class="ti ti-package" style="font-size:2rem;display:block;margin-bottom:0.5rem"></i>暂无商品</td></tr>';
                return;
            }

            var html = '';
            products.forEach(function(product, index) {
                var user = users.find(function(u) { return u.id === product.sellerId; });
                var sellerName = user ? (user.username || '未知') : (product.sellerName || '未知');
                var status = product.status || 'onsale';
                var statusBadge = '';
                var actions = '';
                if (status === 'onsale') {
                    statusBadge = '<span class="badge badge-success">在售</span>';
                    actions = '<button class="btn-admin btn-admin-outline" onclick="viewProduct(' + index + ')"><i class="ti ti-eye" style="margin-right:0.25rem"></i>查看</button> ' +
                              '<button class="btn-admin btn-admin-danger" onclick="removeProduct(' + index + ')"><i class="ti ti-package-off" style="margin-right:0.25rem"></i>下架</button> ' +
                              '<button class="btn-admin btn-admin-danger" onclick="deleteProduct(' + index + ')"><i class="ti ti-trash" style="margin-right:0.25rem"></i>删除</button>';
                } else if (status === 'pending') {
                    statusBadge = '<span class="badge badge-warning">待审核</span>';
                    actions = '<button class="btn-admin btn-admin-success" onclick="approveProduct(' + index + ')"><i class="ti ti-check" style="margin-right:0.25rem"></i>通过</button> ' +
                              '<button class="btn-admin btn-admin-danger" onclick="rejectProduct(' + index + ')"><i class="ti ti-x" style="margin-right:0.25rem"></i>拒绝</button> ' +
                              '<button class="btn-admin btn-admin-danger" onclick="deleteProduct(' + index + ')"><i class="ti ti-trash" style="margin-right:0.25rem"></i>删除</button>';
                } else if (status === 'sold') {
                    statusBadge = '<span class="badge badge-info">已售出</span>';
                    actions = '<button class="btn-admin btn-admin-outline" onclick="viewProduct(' + index + ')"><i class="ti ti-eye" style="margin-right:0.25rem"></i>查看</button> ' +
                              '<button class="btn-admin btn-admin-danger" onclick="deleteProduct(' + index + ')"><i class="ti ti-trash" style="margin-right:0.25rem"></i>删除</button>';
                } else {
                    statusBadge = '<span class="badge badge-secondary">已下架</span>';
                    actions = '<button class="btn-admin btn-admin-outline" onclick="viewProduct(' + index + ')"><i class="ti ti-eye" style="margin-right:0.25rem"></i>查看</button> ' +
                              '<button class="btn-admin btn-admin-success" onclick="approveProduct(' + index + ')"><i class="ti ti-refresh" style="margin-right:0.25rem"></i>恢复</button> ' +
                              '<button class="btn-admin btn-admin-danger" onclick="deleteProduct(' + index + ')"><i class="ti ti-trash" style="margin-right:0.25rem"></i>删除</button>';
                }
                var date = product.createdAt ? new Date(product.createdAt).toLocaleDateString('zh-CN') : '-';
                var price = product.price ? ('¥' + Number(product.price).toLocaleString()) : '-';
                html += '<tr data-status="' + status + '" data-category="' + (product.category || '') + '">' +
                    '<td>' + (product.name || '-') + '</td>' +
                    '<td>' + sellerName + '</td>' +
                    '<td>' + price + '</td>' +
                    '<td>' + (product.categoryName || product.category || '-') + '</td>' +
                    '<td>' + date + '</td>' +
                    '<td>' + statusBadge + '</td>' +
                    '<td>' + actions + '</td>' +
                    '</tr>';
            });
            tbody.innerHTML = html;
            document.getElementById('paginationInfo').textContent = '显示 1-' + products.length + ' / 共 ' + products.length + ' 条';
        }

        document.getElementById('productFilter').addEventListener('change', filterProducts);
        document.getElementById('categoryFilter').addEventListener('change', filterProducts);
        document.getElementById('productSearch').addEventListener('input', function() {
            var keyword = this.value.toLowerCase();
            document.querySelectorAll('#productTableBody tr').forEach(function(row) {
                var text = row.textContent.toLowerCase();
                row.style.display = text.includes(keyword) ? '' : 'none';
            });
        });

        function filterProducts() {
            var status = document.getElementById('productFilter').value;
            var category = document.getElementById('categoryFilter').value;
            document.querySelectorAll('#productTableBody tr').forEach(function(row) {
                var matchStatus = status === 'all' || row.dataset.status === status;
                var matchCategory = category === 'all' || row.dataset.category === category;
                row.style.display = (matchStatus && matchCategory) ? '' : 'none';
            });
        }

        function viewProduct(index) {
            var products = JSON.parse(localStorage.getItem('products') || '[]');
            var users = JSON.parse(localStorage.getItem('users') || '[]');
            var product = products[index];
            if (!product) return;
            var user = users.find(function(u) { return u.id === product.sellerId; });
            var sellerName = user ? (user.username || '未知') : (product.sellerName || '未知');
            var status = product.status || 'onsale';
            var statusBadge = status === 'onsale' ? '<span class="badge badge-success">在售</span>' :
                status === 'pending' ? '<span class="badge badge-warning">待审核</span>' :
                status === 'sold' ? '<span class="badge badge-info">已售出</span>' :
                '<span class="badge badge-secondary">已下架</span>';
            var price = product.price ? ('¥' + Number(product.price).toLocaleString()) : '-';
            document.getElementById('productModal').querySelector('.detail-grid').innerHTML =
                '<div class="detail-item detail-full"><div class="label">商品名称</div><div class="value">' + (product.name || '-') + '</div></div>' +
                '<div class="detail-item"><div class="label">卖家</div><div class="value">' + sellerName + '</div></div>' +
                '<div class="detail-item"><div class="label">价格</div><div class="value">' + price + '</div></div>' +
                '<div class="detail-item"><div class="label">分类</div><div class="value">' + (product.categoryName || product.category || '-') + '</div></div>' +
                '<div class="detail-item"><div class="label">状态</div><div class="value">' + statusBadge + '</div></div>' +
                '<div class="detail-item detail-full"><div class="label">描述</div><div class="value">' + (product.description || '暂无描述') + '</div></div>';
            document.getElementById('productModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('show');
        }

        function approveProduct(index) {
            var products = JSON.parse(localStorage.getItem('products') || '[]');
            var product = products[index];
            if (!product) return;
            product.status = 'onsale';
            localStorage.setItem('products', JSON.stringify(products));
            loadProducts();
            alert('商品已通过审核');
        }

        function rejectProduct(index) {
            var products = JSON.parse(localStorage.getItem('products') || '[]');
            var product = products[index];
            if (!product) return;
            product.status = 'removed';
            localStorage.setItem('products', JSON.stringify(products));
            loadProducts();
            alert('商品已拒绝');
        }

        function removeProduct(index) {
            var products = JSON.parse(localStorage.getItem('products') || '[]');
            var product = products[index];
            if (!product) return;
            product.status = 'removed';
            localStorage.setItem('products', JSON.stringify(products));
            loadProducts();
            alert('商品已下架');
        }

        function deleteProduct(index) {
            if (!confirm('确定要删除该商品吗？此操作不可恢复！')) return;
            var products = JSON.parse(localStorage.getItem('products') || '[]');
            products.splice(index, 1);
            localStorage.setItem('products', JSON.stringify(products));
            loadProducts();
            alert('商品已删除');
        }

        loadProducts();
    </script>
</body>
</html>

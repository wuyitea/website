<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>论坛管理 - 社区平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="ti ti-brand-community"></i> 社区平台</h2>
                <p>管理后台</p>
            </div>
            <nav class="sidebar-nav">
                <a href="admin.html"><i class="ti ti-dashboard"></i> 仪表盘</a>
                <a href="admin-forum.html" class="active"><i class="ti ti-message-circle"></i> 论坛管理</a>
                <a href="admin-market.html"><i class="ti ti-shopping-bag"></i> 商城管理</a>
                <a href="admin-users.html"><i class="ti ti-users"></i> 用户管理</a>
                <div class="sidebar-section">系统</div>
                <a href="admin-settings.html"><i class="ti ti-settings"></i> 网站设置</a>
                <a href="../index.html" target="_blank"><i class="ti ti-external-link"></i> 查看前台</a>
                <a href="#" id="adminLogout"><i class="ti ti-logout"></i> 退出登录</a>
            </nav>
        </aside>

        <main class="admin-main">
            <div class="admin-topbar">
                <div style="display:flex;align-items:center;gap:0.75rem">
                    <button class="btn btn-ghost" id="sidebarToggle" style="display:none;padding:0.375rem">
                        <i class="ti ti-menu-2" style="font-size:1.25rem"></i>
                    </button>
                    <h1>论坛管理</h1>
                </div>
                <div style="display:flex;align-items:center;gap:0.75rem">
                    <span style="font-size:var(--font-size-sm);color:var(--text-secondary)">
                        <i class="ti ti-user-circle"></i> 管理员
                    </span>
                </div>
            </div>

            <div class="admin-content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(79,70,229,0.1);color:var(--primary-color)">
                            <i class="ti ti-file-text"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value">86</div>
                            <div class="stat-label">总帖子数</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(16,185,129,0.1);color:var(--success-color)">
                            <i class="ti ti-circle-check"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value">78</div>
                            <div class="stat-label">已发布</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(245,158,11,0.1);color:var(--warning-color)">
                            <i class="ti ti-clock"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value">5</div>
                            <div class="stat-label">待审核</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(239,68,68,0.1);color:var(--danger-color)">
                            <i class="ti ti-ban"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value">3</div>
                            <div class="stat-label">已屏蔽</div>
                        </div>
                    </div>
                </div>

                <div class="admin-card">
                    <div class="admin-card-header">
                        <h2><i class="ti ti-message-circle" style="margin-right:0.375rem"></i>帖子列表</h2>
                        <div class="card-actions">
                            <div class="input-icon">
                                <i class="ti ti-search"></i>
                                <input type="text" class="admin-search" placeholder="搜索帖子..." id="postSearch">
                            </div>
                            <select class="admin-filter" id="postFilter">
                                <option value="all">全部状态</option>
                                <option value="published">已发布</option>
                                <option value="pending">待审核</option>
                                <option value="blocked">已屏蔽</option>
                            </select>
                        </div>
                    </div>
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>标题</th>
                                <th>作者</th>
                                <th>分类</th>
                                <th>发布时间</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="forumTableBody">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                    <div class="admin-pagination">
                        <span class="pagination-info" id="paginationInfo">显示 0 / 共 0 条</span>
                        <div class="pagination-btns">
                            <button disabled>&laquo;</button>
                            <button class="active">1</button>
                            <button>2</button>
                            <button>3</button>
                            <button>...</button>
                            <button>15</button>
                            <button>&raquo;</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="admin-modal-overlay" id="postModal">
        <div class="admin-modal">
            <div class="admin-modal-header">
                <h3><i class="ti ti-file-text" style="margin-right:0.375rem"></i>帖子详情</h3>
                <button class="admin-modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
            </div>
            <div class="admin-modal-body">
                <div class="detail-grid">
                    <div class="detail-item detail-full">
                        <div class="label">标题</div>
                        <div class="value" id="modalPostTitle">分享一个好用的开发工具</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">作者</div>
                        <div class="value" id="modalPostAuthor">小明</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">分类</div>
                        <div class="value" id="modalPostCategory">技术分享</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">发布时间</div>
                        <div class="value" id="modalPostTime">2026-07-10 14:30</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">状态</div>
                        <div class="value" id="modalPostStatus"><span class="badge badge-success">已发布</span></div>
                    </div>
                    <div class="detail-item detail-full">
                        <div class="label">内容</div>
                        <div class="value" id="modalPostContent">这是一篇关于开发工具的分享帖...</div>
                    </div>
                </div>
            </div>
            <div class="admin-modal-footer">
                <button class="btn-admin btn-admin-outline" onclick="closeModal()"><i class="ti ti-x" style="margin-right:0.25rem"></i>关闭</button>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = 'admin-login.html';
        }
        document.getElementById('adminLogout').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'admin-login.html';
        });

        var sidebarToggle = document.getElementById('sidebarToggle');
        var sidebar = document.getElementById('sidebar');
        if (window.innerWidth <= 768) sidebarToggle.style.display = 'block';
        window.addEventListener('resize', function() {
            sidebarToggle.style.display = window.innerWidth <= 768 ? 'block' : 'none';
        });
        sidebarToggle.addEventListener('click', function() {
            sidebar.classList.toggle('show');
        });

        function loadPosts() {
            var posts = JSON.parse(localStorage.getItem('posts') || '[]');
            var users = JSON.parse(localStorage.getItem('users') || '[]');
            var tbody = document.getElementById('forumTableBody');

            var total = posts.length;
            var published = posts.filter(function(p) { return p.status === 'published'; }).length;
            var pending = posts.filter(function(p) { return p.status === 'pending'; }).length;
            var blocked = posts.filter(function(p) { return p.status === 'blocked'; }).length;
            var cards = document.querySelectorAll('.stat-card .stat-value');
            cards[0].textContent = total;
            cards[1].textContent = published;
            cards[2].textContent = pending;
            cards[3].textContent = blocked;

            if (posts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><div class="icon"><i class="ti ti-file-text" style="font-size:2rem"></i></div><p>暂无帖子</p></td></tr>';
                return;
            }

            var html = '';
            posts.forEach(function(post, index) {
                var user = users.find(function(u) { return u.id === post.authorId; });
                var authorName = user ? (user.username || '未知') : (post.authorName || '未知');
                var status = post.status || 'published';
                var statusBadge = '';
                var actions = '';
                if (status === 'published') {
                    statusBadge = '<span class="badge badge-success"><i class="ti ti-circle-check" style="margin-right:0.25rem"></i>已发布</span>';
                    actions = '<button class="btn-admin btn-admin-outline" onclick="viewPost(' + index + ')"><i class="ti ti-eye"></i></button> ' +
                              '<button class="btn-admin btn-admin-danger" onclick="blockPost(' + index + ')"><i class="ti ti-ban"></i></button> ' +
                              '<button class="btn-admin btn-admin-danger" onclick="deletePost(' + index + ')"><i class="ti ti-trash"></i></button>';
                } else if (status === 'pending') {
                    statusBadge = '<span class="badge badge-warning"><i class="ti ti-clock" style="margin-right:0.25rem"></i>待审核</span>';
                    actions = '<button class="btn-admin btn-admin-success" onclick="approvePost(' + index + ')"><i class="ti ti-check"></i></button> ' +
                              '<button class="btn-admin btn-admin-danger" onclick="rejectPost(' + index + ')"><i class="ti ti-x"></i></button> ' +
                              '<button class="btn-admin btn-admin-danger" onclick="deletePost(' + index + ')"><i class="ti ti-trash"></i></button>';
                } else if (status === 'blocked') {
                    statusBadge = '<span class="badge badge-danger"><i class="ti ti-ban" style="margin-right:0.25rem"></i>已屏蔽</span>';
                    actions = '<button class="btn-admin btn-admin-outline" onclick="viewPost(' + index + ')"><i class="ti ti-eye"></i></button> ' +
                              '<button class="btn-admin btn-admin-success" onclick="approvePost(' + index + ')"><i class="ti ti-check"></i></button> ' +
                              '<button class="btn-admin btn-admin-danger" onclick="deletePost(' + index + ')"><i class="ti ti-trash"></i></button>';
                }
                var date = post.createdAt ? new Date(post.createdAt).toLocaleString('zh-CN') : '-';
                html += '<tr data-status="' + status + '">' +
                    '<td>' + (post.title || '-') + '</td>' +
                    '<td>' + authorName + '</td>' +
                    '<td>' + (post.category || '-') + '</td>' +
                    '<td>' + date + '</td>' +
                    '<td>' + statusBadge + '</td>' +
                    '<td>' + actions + '</td>' +
                    '</tr>';
            });
            tbody.innerHTML = html;
            document.getElementById('paginationInfo').textContent = '显示 1-' + posts.length + ' / 共 ' + posts.length + ' 条';
        }

        document.getElementById('postFilter').addEventListener('change', function() {
            var filter = this.value;
            document.querySelectorAll('#forumTableBody tr').forEach(function(row) {
                if (filter === 'all' || row.dataset.status === filter) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        });

        document.getElementById('postSearch').addEventListener('input', function() {
            var keyword = this.value.toLowerCase();
            document.querySelectorAll('#forumTableBody tr').forEach(function(row) {
                var text = row.textContent.toLowerCase();
                row.style.display = text.includes(keyword) ? '' : 'none';
            });
        });

        function viewPost(index) {
            var posts = JSON.parse(localStorage.getItem('posts') || '[]');
            var users = JSON.parse(localStorage.getItem('users') || '[]');
            var post = posts[index];
            if (!post) return;
            var user = users.find(function(u) { return u.id === post.authorId; });
            var authorName = user ? (user.username || '未知') : (post.authorName || '未知');
            var status = post.status || 'published';
            var statusBadge = status === 'published' ? '<span class="badge badge-success"><i class="ti ti-circle-check" style="margin-right:0.25rem"></i>已发布</span>' :
                status === 'pending' ? '<span class="badge badge-warning"><i class="ti ti-clock" style="margin-right:0.25rem"></i>待审核</span>' :
                '<span class="badge badge-danger"><i class="ti ti-ban" style="margin-right:0.25rem"></i>已屏蔽</span>';
            document.getElementById('postModal').querySelector('.detail-grid').innerHTML =
                '<div class="detail-item detail-full"><div class="label">标题</div><div class="value">' + (post.title || '-') + '</div></div>' +
                '<div class="detail-item"><div class="label">作者</div><div class="value">' + authorName + '</div></div>' +
                '<div class="detail-item"><div class="label">分类</div><div class="value">' + (post.category || '-') + '</div></div>' +
                '<div class="detail-item"><div class="label">发布时间</div><div class="value">' + (post.createdAt ? new Date(post.createdAt).toLocaleString('zh-CN') : '-') + '</div></div>' +
                '<div class="detail-item"><div class="label">状态</div><div class="value">' + statusBadge + '</div></div>' +
                '<div class="detail-item detail-full"><div class="label">内容</div><div class="value">' + (post.content || '暂无内容') + '</div></div>';
            document.getElementById('postModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('postModal').classList.remove('show');
        }

        function approvePost(index) {
            var posts = JSON.parse(localStorage.getItem('posts') || '[]');
            var post = posts[index];
            if (!post) return;
            post.status = 'published';
            localStorage.setItem('posts', JSON.stringify(posts));
            loadPosts();
            alert('帖子已通过审核');
        }

        function rejectPost(index) {
            var posts = JSON.parse(localStorage.getItem('posts') || '[]');
            var post = posts[index];
            if (!post) return;
            post.status = 'blocked';
            localStorage.setItem('posts', JSON.stringify(posts));
            loadPosts();
            alert('帖子已拒绝');
        }

        function blockPost(index) {
            var posts = JSON.parse(localStorage.getItem('posts') || '[]');
            var post = posts[index];
            if (!post) return;
            post.status = 'blocked';
            localStorage.setItem('posts', JSON.stringify(posts));
            loadPosts();
            alert('帖子已屏蔽');
        }

        function deletePost(index) {
            if (!confirm('确定要删除该帖子吗？此操作不可恢复！')) return;
            var posts = JSON.parse(localStorage.getItem('posts') || '[]');
            posts.splice(index, 1);
            localStorage.setItem('posts', JSON.stringify(posts));
            loadPosts();
            alert('帖子已删除');
        }

        loadPosts();
    </script>
</body>
</html>
